<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-label="学术文稿品味链" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <rect x="22" y="22" width="1076" height="386" rx="24" fill="#fffaf0" stroke="#3a342c" stroke-width="2.4"/>
  <text x="54" y="66" fill="#2f2a24" font-size="24" font-weight="700">学术文稿品味链：把读者从起点带到出口</text>
  <text x="54" y="96" fill="#5f5548" font-size="14">好文稿不是把信息排满，而是让每个构件都推动同一条理解路径。</text>

  <g transform="translate(64 142)">
    <rect width="142" height="92" rx="18" fill="#bfd7ea" fill-opacity=".78" stroke="#3a342c" stroke-width="1.8"/>
    <text x="24" y="38" fill="#2f2a24" font-size="16" font-weight="700">读者起点</text>
    <text x="24" y="66" fill="#5f5548" font-size="13">他已经知道什么</text>
  </g>
  <path d="M214 188 L264 188" stroke="#3a342c" stroke-width="2"/>
  <path d="M264 188 l-9 -6 v12 z" fill="#3a342c"/>

  <g transform="translate(274 142)">
    <rect width="142" height="92" rx="18" fill="#d8eac8" stroke="#3a342c" stroke-width="1.8"/>
    <text x="24" y="38" fill="#2f2a24" font-size="16" font-weight="700">中心问题</text>
    <text x="24" y="66" fill="#5f5548" font-size="13">他最卡在哪里</text>
  </g>
  <path d="M424 188 L474 188" stroke="#3a342c" stroke-width="2"/>
  <path d="M474 188 l-9 -6 v12 z" fill="#3a342c"/>

  <g transform="translate(484 142)">
    <rect width="142" height="92" rx="18" fill="#f2e7c9" stroke="#3a342c" stroke-width="1.8"/>
    <text x="24" y="38" fill="#2f2a24" font-size="16" font-weight="700">章节接力</text>
    <text x="24" y="66" fill="#5f5548" font-size="13">一步接一步推进</text>
  </g>
  <path d="M634 188 L684 188" stroke="#3a342c" stroke-width="2"/>
  <path d="M684 188 l-9 -6 v12 z" fill="#3a342c"/>

  <g transform="translate(694 142)">
    <rect width="142" height="92" rx="18" fill="#f2b6a0" fill-opacity=".84" stroke="#3a342c" stroke-width="1.8"/>
    <text x="24" y="38" fill="#2f2a24" font-size="16" font-weight="700">局部支撑</text>
    <text x="24" y="66" fill="#5f5548" font-size="13">图表证据及时出现</text>
  </g>
  <path d="M844 188 L894 188" stroke="#3a342c" stroke-width="2"/>
  <path d="M894 188 l-9 -6 v12 z" fill="#3a342c"/>

  <g transform="translate(904 142)">
    <rect width="142" height="92" rx="18" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.8"/>
    <text x="24" y="38" fill="#2f2a24" font-size="16" font-weight="700">读者出口</text>
    <text x="24" y="66" fill="#5f5548" font-size="13">读完能做什么</text>
  </g>

  <rect x="88" y="292" width="944" height="54" rx="14" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.6"/>
  <text x="112" y="326" fill="#5f5548" font-size="14">判断句：如果某个章节、图或表不能推动这条链，它就只是材料，不应进入正文主线。</text>
</svg>
