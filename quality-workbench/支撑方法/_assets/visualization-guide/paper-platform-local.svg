<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">论文与平台类图形局部示意</title>
  <desc id="desc">展示对比矩阵、论文角色地图和机制平台链路图的区别。</desc>
  <style>
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;fill:#24303d}
    .panel{fill:#fbfaf7;stroke:#d7d0c3;stroke-width:1.5}
    .title{font-size:18px;font-weight:700}
    .small{font-size:13px}
    .note{font-size:12px;fill:#58636f}
    .head{fill:#e8edf4;stroke:#8aa0b7;stroke-width:1.5}
    .cell{fill:#fff;stroke:#d5d9df;stroke-width:1}
    .main{fill:#d95243;stroke:#963529;stroke-width:2}
    .mid{fill:#f5e6cf;stroke:#c89b5e;stroke-width:1.8}
    .blue{fill:#e8edf4;stroke:#8aa0b7;stroke-width:1.8}
    .line{stroke:#607080;stroke-width:2;fill:none}
    .weak{stroke:#8c98a6;stroke-width:1.6;stroke-dasharray:5 5;fill:none}
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#607080"/>
    </marker>
  </defs>

  <rect class="panel" x="18" y="18" width="280" height="324" rx="18"/>
  <text class="title" x="158" y="48" text-anchor="middle">对比矩阵</text>
  <rect class="head" x="48" y="82" width="70" height="36" rx="8"/>
  <rect class="head" x="118" y="82" width="70" height="36" rx="8"/>
  <rect class="head" x="188" y="82" width="70" height="36" rx="8"/>
  <text class="small" x="83" y="105" text-anchor="middle">角色</text>
  <text class="small" x="153" y="105" text-anchor="middle">方法</text>
  <text class="small" x="223" y="105" text-anchor="middle">产出</text>
  <g>
    <rect class="cell" x="48" y="130" width="70" height="34" rx="6"/><rect class="cell" x="118" y="130" width="70" height="34" rx="6"/><rect class="cell" x="188" y="130" width="70" height="34" rx="6"/>
    <rect class="cell" x="48" y="174" width="70" height="34" rx="6"/><rect class="cell" x="118" y="174" width="70" height="34" rx="6"/><rect class="cell" x="188" y="174" width="70" height="34" rx="6"/>
    <rect class="cell" x="48" y="218" width="70" height="34" rx="6"/><rect class="cell" x="118" y="218" width="70" height="34" rx="6"/><rect class="cell" x="188" y="218" width="70" height="34" rx="6"/>
  </g>
  <text class="note" x="30" y="151">P1</text><text class="note" x="30" y="195">P2</text><text class="note" x="30" y="239">P3</text>
  <text class="note" x="50" y="304">多个对象按同一组问题比较时使用。</text>

  <rect class="panel" x="320" y="18" width="280" height="324" rx="18"/>
  <text class="title" x="460" y="48" text-anchor="middle">论文角色地图</text>
  <circle class="main" cx="460" cy="172" r="42"/>
  <text class="small" x="460" y="165" text-anchor="middle" fill="#fff">中心</text>
  <text class="small" x="460" y="183" text-anchor="middle" fill="#fff">问题</text>
  <rect class="blue" x="370" y="92" width="70" height="36" rx="12"/>
  <rect class="mid" x="488" y="92" width="70" height="36" rx="12"/>
  <rect class="mid" x="370" y="232" width="70" height="36" rx="12"/>
  <rect class="blue" x="488" y="232" width="70" height="36" rx="12"/>
  <path class="line" d="M430 122 C445 135 450 145 452 132" marker-end="url(#arrow)"/>
  <path class="line" d="M500 122 C484 136 476 145 472 132" marker-end="url(#arrow)"/>
  <path class="line" d="M430 238 C443 220 450 208 452 212" marker-end="url(#arrow)"/>
  <path class="weak" d="M500 238 C486 218 477 207 473 212" marker-end="url(#arrow)"/>
  <text class="small" x="405" y="116" text-anchor="middle">底座</text>
  <text class="small" x="523" y="116" text-anchor="middle">方法</text>
  <text class="small" x="405" y="256" text-anchor="middle">目标</text>
  <text class="small" x="523" y="256" text-anchor="middle">旁支</text>
  <text class="note" x="352" y="304">论文不一定单线前进，先看角色分工。</text>

  <rect class="panel" x="622" y="18" width="280" height="324" rx="18"/>
  <text class="title" x="762" y="48" text-anchor="middle">机制 / 平台链路</text>
  <rect class="blue" x="660" y="116" width="74" height="42" rx="12"/>
  <rect class="mid" x="750" y="116" width="74" height="42" rx="12"/>
  <rect class="blue" x="660" y="206" width="74" height="42" rx="12"/>
  <rect class="mid" x="750" y="206" width="74" height="42" rx="12"/>
  <path class="line" d="M734 137 L750 137" marker-end="url(#arrow)"/>
  <path class="line" d="M787 158 L787 206" marker-end="url(#arrow)"/>
  <path class="line" d="M750 227 L734 227" marker-end="url(#arrow)"/>
  <text class="small" x="697" y="142" text-anchor="middle">样品</text>
  <text class="small" x="787" y="142" text-anchor="middle">激发</text>
  <text class="small" x="697" y="232" text-anchor="middle">数据</text>
  <text class="small" x="787" y="232" text-anchor="middle">测量</text>
  <text class="note" x="652" y="304">箭头表示输入输出、测量流或信息流。</text>
</svg>
