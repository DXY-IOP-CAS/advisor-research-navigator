<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="470" viewBox="0 0 1080 470" role="img" aria-label="机制示意图" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="4.5" orient="auto"><path d="M0,0 L10,4.5 L0,9 Z" fill="#2f3337"/></marker>
    <style>
      .title{font-size:24px;font-weight:700;fill:#202428}
      .note{font-size:13px;fill:#5d6670}
      .head{font-size:15px;font-weight:700;fill:#202428}
      .txt{font-size:13px;fill:#343a40}
      .small{font-size:12px;fill:#5d6670}
      .box{stroke:#2f3337;stroke-width:1.6}
      .thin{stroke:#2f3337;stroke-width:1.2}
      .line{stroke:#2f3337;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .curve{stroke:#2f3337;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#9aa0a6;stroke-width:1.3;fill:none}
      .weak{stroke:#6f7780;stroke-width:1.7;fill:none;stroke-dasharray:7 5;marker-end:url(#arrow)}
      .return{stroke:#6f7780;stroke-width:1.7;fill:none;stroke-dasharray:4 6}
      .bad{stroke:#8a3a32;stroke-width:2.3;fill:none}
      .region{stroke:#2f3337;stroke-width:1.6;opacity:.92}
    </style>
  </defs>
  <rect x="16" y="16" width="1048" height="438" rx="14" fill="#fbfaf7" stroke="#2f3337" stroke-width="2"/>
  <text x="38" y="50" class="title">机制示意图</text>
  <text x="38" y="76" class="note">用于 03/04：让学生看懂平台、实验或计算链条怎样从输入走到输出。</text>
  <path d="M104 242 L220 242" class="line" fill="none"/><text x="118" y="218" class="head">输入</text><path d="M242 204 C302 168 384 174 432 228 C384 284 300 292 242 252 Z" class="region" fill="#f6e7c6"/><text x="336" y="232" class="head" text-anchor="middle">样品 / 系统</text><path d="M432 242 L548 242" class="line" fill="none"/><circle cx="596" cy="242" r="44" fill="#dce9f6" class="box"/><text x="596" y="236" class="head" text-anchor="middle">测量</text><text x="596" y="260" class="small" text-anchor="middle">信号</text><path d="M640 242 C700 238 748 214 800 184" class="curve" fill="none"/><rect x="808" y="144" width="130" height="80" rx="10" fill="#d9ead3" class="box"/><text x="873" y="178" class="head" text-anchor="middle">分析</text><text x="873" y="202" class="small" text-anchor="middle">输出图 / 结论</text><path d="M802 306 C690 346 448 350 328 294" class="return" fill="none"/><text x="564" y="340" class="small" text-anchor="middle">回看线：读不懂机制时，回到四个环节逐个解释</text><rect x="78" y="382" width="920" height="42" rx="8" fill="#ffffff" class="box"/><text x="104" y="409" class="txt">限制：只有证据支持流转关系时才画机制；如果只是名词相邻，改成概念图或候选关系。</text>
</svg>
