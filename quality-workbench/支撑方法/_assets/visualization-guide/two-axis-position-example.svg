<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" role="img" aria-label="二维定位图示例" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#3a342c"/></marker>
    <style>.bg{fill:#fffaf0;stroke:#3a342c;stroke-width:2.2}.title{fill:#2f2a24;font-size:22px;font-weight:700}.note{fill:#5f5548;font-size:13px}.axis{stroke:#3a342c;stroke-width:2;marker-end:url(#arrow)}.grid{stroke:#d6c8ad;stroke-width:1.2;stroke-dasharray:6 5}.label{fill:#2f2a24;font-size:15px;font-weight:700}.small{fill:#5f5548;font-size:12px}</style>
  </defs>
  <rect x="20" y="20" width="680" height="300" rx="22" class="bg"/>
  <text x="48" y="62" class="title">二维定位图：用两个维度解释“靠近哪里”</text>
  <text x="48" y="88" class="note">轴名要能被一句话解释，点位只表达证据允许的粗略判断。</text>
  <line x1="135" y1="260" x2="580" y2="260" class="axis"/>
  <line x1="135" y1="260" x2="135" y2="112" class="axis"/>
  <line x1="135" y1="186" x2="560" y2="186" class="grid"/>
  <line x1="358" y1="260" x2="358" y2="116" class="grid"/>
  <rect x="382" y="128" width="132" height="78" rx="18" fill="#f2e7c9" stroke="#3a342c" stroke-width="1.6"/>
  <circle cx="456" cy="162" r="13" fill="#f2b6a0" stroke="#3a342c" stroke-width="1.8"/>
  <text x="456" y="196" class="label" text-anchor="middle">导师方向</text>
  <text x="580" y="286" class="label" text-anchor="end">实验观测强</text>
  <text x="98" y="120" class="label" text-anchor="middle">非平衡</text>
  <text x="146" y="286" class="small">理论 / 平衡</text>
</svg>
