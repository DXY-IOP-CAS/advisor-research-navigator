<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">时间与学习类图形局部示意</title>
  <desc id="desc">展示时间演化图、学习桥图和核心图标注的区别。</desc>
  <style>
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;fill:#24303d}
    .panel{fill:#fbfaf7;stroke:#d7d0c3;stroke-width:1.5}
    .title{font-size:18px;font-weight:700}
    .small{font-size:13px}
    .note{font-size:12px;fill:#58636f}
    .main{fill:#d95243;stroke:#963529;stroke-width:2}
    .mid{fill:#f5e6cf;stroke:#c89b5e;stroke-width:1.8}
    .blue{fill:#e8edf4;stroke:#8aa0b7;stroke-width:1.8}
    .line{stroke:#607080;stroke-width:2;fill:none}
    .axis{stroke:#607080;stroke-width:2}
    .anno{stroke:#d95243;stroke-width:2;fill:none}
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#607080"/>
    </marker>
    <marker id="redArrow" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#d95243"/>
    </marker>
  </defs>

  <rect class="panel" x="18" y="18" width="280" height="324" rx="18"/>
  <text class="title" x="158" y="48" text-anchor="middle">时间 / 演化图</text>
  <line class="line" x1="92" y1="92" x2="92" y2="260" marker-end="url(#arrow)"/>
  <circle class="blue" cx="92" cy="116" r="12"/><circle class="mid" cx="92" cy="176" r="12"/><circle class="main" cx="92" cy="236" r="12"/>
  <rect class="blue" x="122" y="96" width="112" height="40" rx="12"/>
  <rect class="mid" x="122" y="156" width="112" height="40" rx="12"/>
  <rect class="main" x="122" y="216" width="112" height="40" rx="12"/>
  <text class="small" x="178" y="121" text-anchor="middle">早期阶段</text>
  <text class="small" x="178" y="181" text-anchor="middle">过渡阶段</text>
  <text class="small" x="178" y="241" text-anchor="middle" fill="#fff">当前阶段</text>
  <text class="note" x="48" y="304">只有阶段变化本身重要时才用时间图。</text>

  <rect class="panel" x="320" y="18" width="280" height="324" rx="18"/>
  <text class="title" x="460" y="48" text-anchor="middle">学习桥图</text>
  <rect class="blue" x="352" y="96" width="78" height="44" rx="12"/>
  <rect class="mid" x="418" y="164" width="86" height="44" rx="12"/>
  <rect class="mid" x="490" y="96" width="78" height="44" rx="12"/>
  <rect class="main" x="490" y="232" width="78" height="44" rx="12"/>
  <path class="line" d="M430 118 C450 132 456 148 460 164" marker-end="url(#arrow)"/>
  <path class="line" d="M504 164 C512 150 520 140 528 140" marker-end="url(#arrow)"/>
  <path class="line" d="M460 208 C472 224 484 232 490 246" marker-end="url(#arrow)"/>
  <text class="small" x="391" y="122" text-anchor="middle">已学课</text>
  <text class="small" x="461" y="190" text-anchor="middle">概念缺口</text>
  <text class="small" x="529" y="122" text-anchor="middle">方法能力</text>
  <text class="small" x="529" y="258" text-anchor="middle" fill="#fff">目标论文</text>
  <text class="note" x="352" y="304">每一段都要接一个可做的小输出。</text>

  <rect class="panel" x="622" y="18" width="280" height="324" rx="18"/>
  <text class="title" x="762" y="48" text-anchor="middle">核心图标注</text>
  <rect x="682" y="96" width="142" height="142" rx="10" fill="#fff" stroke="#d5d9df" stroke-width="1.5"/>
  <line class="axis" x1="704" y1="214" x2="806" y2="214" marker-end="url(#arrow)"/>
  <line class="axis" x1="704" y1="214" x2="704" y2="116" marker-end="url(#arrow)"/>
  <path d="M710 198 C735 178 756 162 806 132" stroke="#c89b5e" stroke-width="4" fill="none"/>
  <circle cx="766" cy="156" r="6" fill="#d95243"/>
  <path class="anno" d="M790 86 C780 110 772 130 766 150" marker-end="url(#redArrow)"/>
  <text class="note" x="798" y="86">先看变量</text>
  <path class="anno" d="M846 210 C830 190 808 174 774 160" marker-end="url(#redArrow)"/>
  <text class="note" x="826" y="234">再看趋势</text>
  <text class="note" x="652" y="304">帮助新手按坐标、变量、趋势、结论读图。</text>
</svg>
