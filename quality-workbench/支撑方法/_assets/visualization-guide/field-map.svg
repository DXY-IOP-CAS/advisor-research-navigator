<svg xmlns="http://www.w3.org/2000/svg" width="760" height="330" viewBox="0 0 760 330" role="img" aria-label="领域范围图示例" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <rect x="18" y="22" width="724" height="268" rx="22" fill="#fffaf0" stroke="#3a342c" stroke-width="2.4"/>
  <text x="44" y="62" fill="#2f2a24" font-size="20" font-weight="700">大领域：物理学中的若干板块</text>
  <circle cx="245" cy="172" r="92" fill="#bfd7ea" fill-opacity="0.78"/>
  <circle cx="245" cy="172" r="92" fill="none" stroke="#3a342c" stroke-width="2.2"/>
  <text x="191" y="158" fill="#2f2a24" font-size="15">凝聚态</text>
  <text x="181" y="184" fill="#5f5548" font-size="12.5">稳定大方向</text>
  <circle cx="442" cy="168" r="78" fill="#d8eac8" fill-opacity="0.78"/>
  <circle cx="442" cy="168" r="78" fill="none" stroke="#3a342c" stroke-width="2.2"/>
  <text x="472" y="154" fill="#2f2a24" font-size="15" text-anchor="middle">量子材料</text>
  <text x="472" y="180" fill="#5f5548" font-size="12.5" text-anchor="middle">相邻区域</text>
  <circle cx="345" cy="158" r="50" fill="#f2b6a0" fill-opacity="0.78"/>
  <circle cx="345" cy="158" r="50" fill="none" stroke="#3a342c" stroke-width="2.2"/>
  <text x="345" y="154" fill="#2f2a24" font-size="15" text-anchor="middle">导师方向</text>
  <text x="345" y="176" fill="#5f5548" font-size="12.5" text-anchor="middle">当前高亮</text>
  <rect x="560" y="190" width="130" height="46" rx="12" fill="#f2e7c9"/>
  <rect x="560" y="190" width="130" height="46" rx="12" fill="none" stroke="#5f5548" stroke-width="1.6" stroke-dasharray="7 5"/>
  <text x="584" y="219" fill="#2f2a24" font-size="15">需复核邻域</text>
  <text x="44" y="276" fill="#5f5548" font-size="13">读法：先看大边框，再看高亮圈，最后看虚线区域。虚线表示当前证据不足。</text>
</svg>
