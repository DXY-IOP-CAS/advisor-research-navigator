<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" role="img" aria-label="学习桥图示例" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#3a342c"/></marker>
    <style>.bg{fill:#fffaf0;stroke:#3a342c;stroke-width:2.2}.title{fill:#2f2a24;font-size:22px;font-weight:700}.note{fill:#5f5548;font-size:13px}.box{stroke:#3a342c;stroke-width:1.8}.line{stroke:#3a342c;stroke-width:2;marker-end:url(#arrow)}.label{fill:#2f2a24;font-size:14px;font-weight:700}.small{fill:#5f5548;font-size:12px}</style>
  </defs>
  <rect x="20" y="20" width="680" height="300" rx="22" class="bg"/>
  <text x="48" y="62" class="title">学习桥图：从已有基础接到目标论文</text>
  <text x="48" y="88" class="note">每一段都要有小输出，避免路线变成课程名列表。</text>
  <rect x="54" y="142" width="108" height="58" rx="16" fill="#bfd7ea" class="box"/><text x="108" y="166" class="label" text-anchor="middle">已学基础</text><text x="108" y="186" class="small" text-anchor="middle">高数/普物</text>
  <line x1="168" y1="171" x2="214" y2="171" class="line"/>
  <rect x="220" y="128" width="112" height="86" rx="16" fill="#f2e7c9" class="box"/><text x="276" y="156" class="label" text-anchor="middle">概念缺口</text><text x="276" y="178" class="small" text-anchor="middle">先会解释</text><text x="276" y="196" class="small" text-anchor="middle">关键词</text>
  <line x1="338" y1="171" x2="384" y2="171" class="line"/>
  <rect x="390" y="128" width="112" height="86" rx="16" fill="#d8eac8" class="box"/><text x="446" y="156" class="label" text-anchor="middle">方法缺口</text><text x="446" y="178" class="small" text-anchor="middle">能读懂</text><text x="446" y="196" class="small" text-anchor="middle">图和变量</text>
  <line x1="508" y1="171" x2="554" y2="171" class="line"/>
  <rect x="560" y="142" width="108" height="58" rx="16" fill="#f2b6a0" class="box"/><text x="614" y="166" class="label" text-anchor="middle">目标论文</text><text x="614" y="186" class="small" text-anchor="middle">输出问题</text>
</svg>
