<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" role="img" aria-label="核心图标注示例" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#3a342c"/></marker>
    <style>.bg{fill:#fffaf0;stroke:#3a342c;stroke-width:2.2}.title{fill:#2f2a24;font-size:22px;font-weight:700}.note{fill:#5f5548;font-size:13px}.axis{stroke:#3a342c;stroke-width:2}.curve{fill:none;stroke:#f2b6a0;stroke-width:3}.call{fill:#f8f3e8;stroke:#3a342c;stroke-width:1.5}.line{stroke:#3a342c;stroke-width:1.5;marker-end:url(#arrow)}.label{fill:#2f2a24;font-size:14px;font-weight:700}.small{fill:#5f5548;font-size:12px}</style>
  </defs>
  <rect x="20" y="20" width="680" height="300" rx="22" class="bg"/>
  <text x="48" y="62" class="title">核心图标注：教学生按顺序读论文图</text>
  <text x="48" y="88" class="note">可以画抽象骨架图，说明坐标、变量、趋势和结论。</text>
  <line x1="110" y1="250" x2="400" y2="250" class="axis"/><line x1="110" y1="250" x2="110" y2="122" class="axis"/>
  <path d="M118 226 C170 184,220 210,268 158 S350 132,392 168" class="curve"/>
  <circle cx="268" cy="158" r="6" fill="#f2b6a0" stroke="#3a342c" stroke-width="1.4"/>
  <rect x="442" y="126" width="190" height="104" rx="16" class="call"/>
  <text x="462" y="154" class="label">读法顺序</text>
  <text x="462" y="180" class="small">1. 坐标表示什么</text>
  <text x="462" y="200" class="small">2. 曲线趋势在哪里变化</text>
  <text x="462" y="220" class="small">3. 作者想证明什么</text>
  <line x1="442" y1="176" x2="278" y2="162" class="line"/>
  <text x="96" y="118" class="small">响应</text><text x="392" y="274" class="small">变量</text>
</svg>
