<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" role="img" aria-label="阅读决策图示例" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#3a342c"/></marker>
    <style>.bg{fill:#fffaf0;stroke:#3a342c;stroke-width:2.2}.title{fill:#2f2a24;font-size:22px;font-weight:700}.note{fill:#5f5548;font-size:13px}.box{stroke:#3a342c;stroke-width:1.7}.line{stroke:#3a342c;stroke-width:1.8;marker-end:url(#arrow)}.label{fill:#2f2a24;font-size:14px;font-weight:700}.small{fill:#5f5548;font-size:12px}</style>
  </defs>
  <rect x="20" y="20" width="680" height="300" rx="22" class="bg"/>
  <text x="48" y="62" class="title">阅读决策图：帮学生决定继续、回看或记录卡点</text>
  <text x="48" y="88" class="note">条件要少而具体，不把五份文档画成机械流程。</text>
  <rect x="264" y="112" width="190" height="52" rx="16" fill="#f2e7c9" class="box"/><text x="359" y="144" class="label" text-anchor="middle">能复述本节出口吗？</text>
  <line x1="310" y1="164" x2="190" y2="218" class="line"/><line x1="410" y1="164" x2="530" y2="218" class="line"/>
  <rect x="78" y="218" width="220" height="56" rx="16" fill="#bfd7ea" class="box"/><text x="188" y="242" class="label" text-anchor="middle">不能：回看指定小节</text><text x="188" y="262" class="small" text-anchor="middle">或记录卡点</text>
  <rect x="422" y="218" width="220" height="56" rx="16" fill="#d8eac8" class="box"/><text x="532" y="242" class="label" text-anchor="middle">可以：进入下一份</text><text x="532" y="262" class="small" text-anchor="middle">带走一句输出</text>
  <text x="240" y="194" class="small">否</text><text x="468" y="194" class="small">是</text>
</svg>
