<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="420" viewBox="0 0 1040 420" role="img" aria-label="S4 关系负担诊断图" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#35373a"/>
    </marker>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #222426; }
      .note { font-size: 14px; fill: #5e646b; }
      .node-title { font-size: 16px; font-weight: 700; fill: #222426; }
      .node-text { font-size: 13px; fill: #3e4348; }
      .small { font-size: 12px; fill: #5e646b; }
      .line { stroke: #35373a; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .drop { stroke: #727a82; stroke-width: 1.8; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 5; }
    </style>
  </defs>

  <rect x="18" y="18" width="1004" height="384" rx="18" fill="#fbfaf7" stroke="#2f3337" stroke-width="2"/>
  <text x="42" y="58" class="title">S4 的判断顺序：先诊断关系负担，再决定视觉支撑</text>
  <text x="42" y="84" class="note">主线从左到右走；下方出口表示停写、降级或回到 S1 / S2 / S3。</text>

  <g transform="translate(42 126)">
    <rect x="0" y="0" width="132" height="86" rx="10" fill="#d9ead3" stroke="#2f3337" stroke-width="1.8"/>
    <text x="16" y="29" class="node-title">学生输出</text>
    <text x="16" y="55" class="node-text">读完要能说</text>
    <text x="16" y="73" class="node-text">什么或做什么</text>
  </g>

  <g transform="translate(206 126)">
    <rect x="0" y="0" width="132" height="86" rx="10" fill="#dce9f6" stroke="#2f3337" stroke-width="1.8"/>
    <text x="16" y="29" class="node-title">关系负担</text>
    <text x="16" y="55" class="node-text">哪段关系</text>
    <text x="16" y="73" class="node-text">靠脑子硬扛</text>
  </g>

  <g transform="translate(370 126)">
    <rect x="0" y="0" width="132" height="86" rx="10" fill="#f6e7c6" stroke="#2f3337" stroke-width="1.8"/>
    <text x="16" y="29" class="node-title">证据边界</text>
    <text x="16" y="55" class="node-text">S1 允许画到</text>
    <text x="16" y="73" class="node-text">什么程度</text>
  </g>

  <g transform="translate(534 126)">
    <rect x="0" y="0" width="132" height="86" rx="10" fill="#f1d4cf" stroke="#2f3337" stroke-width="1.8"/>
    <text x="16" y="29" class="node-title">最轻形式</text>
    <text x="16" y="55" class="node-text">正文、清单、表格</text>
    <text x="16" y="73" class="node-text">能否解决</text>
  </g>

  <g transform="translate(698 126)">
    <rect x="0" y="0" width="132" height="86" rx="10" fill="#e7ddf2" stroke="#2f3337" stroke-width="1.8"/>
    <text x="16" y="29" class="node-title">正文消费</text>
    <text x="16" y="55" class="node-text">图前、图下、图后</text>
    <text x="16" y="73" class="node-text">是否接住</text>
  </g>

  <g transform="translate(862 126)">
    <rect x="0" y="0" width="132" height="86" rx="10" fill="#eef1f3" stroke="#2f3337" stroke-width="1.8"/>
    <text x="16" y="29" class="node-title">学生复述</text>
    <text x="16" y="55" class="node-text">看完能复述</text>
    <text x="16" y="73" class="node-text">这段关系</text>
  </g>

  <g transform="translate(195 292)">
    <rect x="0" y="0" width="150" height="62" rx="8" fill="#f4f5f6" stroke="#727a82" stroke-width="1.4"/>
    <text x="18" y="26" class="node-text">说不清输出</text>
    <text x="18" y="46" class="small">回 S2</text>
  </g>

  <g transform="translate(376 292)">
    <rect x="0" y="0" width="150" height="62" rx="8" fill="#f4f5f6" stroke="#727a82" stroke-width="1.4"/>
    <text x="18" y="26" class="node-text">证据不够</text>
    <text x="18" y="46" class="small">回 S1 或降级</text>
  </g>

  <g transform="translate(557 292)">
    <rect x="0" y="0" width="150" height="62" rx="8" fill="#f4f5f6" stroke="#727a82" stroke-width="1.4"/>
    <text x="18" y="26" class="node-text">轻形式够用</text>
    <text x="18" y="46" class="small">保留正文 / 表格</text>
  </g>

  <g transform="translate(738 292)">
    <rect x="0" y="0" width="150" height="62" rx="8" fill="#f4f5f6" stroke="#727a82" stroke-width="1.4"/>
    <text x="18" y="26" class="node-text">正文不消费</text>
    <text x="18" y="46" class="small">回 S3 或删图</text>
  </g>

  <path class="line" d="M174 169 L199 169"/>
  <path class="line" d="M338 169 L363 169"/>
  <path class="line" d="M502 169 L527 169"/>
  <path class="line" d="M666 169 L691 169"/>
  <path class="line" d="M830 169 L855 169"/>

  <path class="drop" d="M272 214 L272 286"/>
  <path class="drop" d="M436 214 L451 286"/>
  <path class="drop" d="M600 214 L632 286"/>
  <path class="drop" d="M764 214 L813 286"/>

  <text x="206" y="245" class="small">出口不清</text>
  <text x="381" y="245" class="small">边界不清</text>
  <text x="548" y="245" class="small">支撑过重</text>
  <text x="726" y="245" class="small">接不上正文</text>
</svg>
