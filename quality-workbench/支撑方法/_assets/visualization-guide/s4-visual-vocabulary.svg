  <text x="38" y="76" class="note">图不是把文字装进框里；不同理解任务需要不同图像语法。</text>
  <circle cx="540" cy="320" r="52" fill="#e7ddf2" class="box"/><text x="540" y="313" class="head" text-anchor="middle">学生输出</text><text x="540" y="338" class="small" text-anchor="middle">决定图形语法</text><path d="M78 156 C60 108 104 84 154 96 C214 110 238 152 206 196 C172 240 92 218 78 156 Z" class="region" fill="#dce9f6"/><path d="M126 158 C118 132 146 120 176 132 C206 146 204 182 172 190 C142 198 130 180 126 158 Z" class="region" fill="#d9ead3"/><circle cx="184" cy="168" r="10" fill="#f1d4cf" class="box"/><text x="142" y="260" class="head" text-anchor="middle">地图 / 区域</text><text x="142" y="284" class="small" text-anchor="middle">范围、包含、相邻</text><circle cx="414" cy="126" r="30" fill="#f6e7c6" class="box"/><text x="414" y="131" class="small" text-anchor="middle">领域</text><path d="M414 156 C400 176 358 188 350 202" class="soft" fill="none"/><circle cx="350" cy="206" r="26" fill="#dce9f6" class="box"/><text x="350" y="211" class="small" text-anchor="middle">子域</text><path d="M414 156 C400 176 486 188 478 202" class="soft" fill="none"/><circle cx="478" cy="206" r="26" fill="#d9ead3" class="box"/><text x="478" y="211" class="small" text-anchor="middle">问题</text><text x="414" y="268" class="head" text-anchor="middle">层级 / 分类树</text><text x="414" y="292" class="small" text-anchor="middle">上下位、集合拆分</text><circle cx="800" cy="132" r="32" fill="#d9ead3" class="box"/><text x="800" y="137" class="small" text-anchor="middle">概念A</text><circle cx="916" cy="112" r="32" fill="#dce9f6" class="box"/><text x="916" y="117" class="small" text-anchor="middle">概念B</text><circle cx="926" cy="210" r="32" fill="#f6e7c6" class="box"/><text x="926" y="215" class="small" text-anchor="middle">概念C</text><path d="M832 128 C858 122 878 118 884 116" class="curve" fill="none"/><text x="858" y="104" class="small" text-anchor="middle">属于</text><path d="M826 152 C862 184 888 198 898 204" class="curve" fill="none"/><text x="858" y="188" class="small" text-anchor="middle">支撑</text><text x="874" y="272" class="head" text-anchor="middle">概念图</text><text x="874" y="296" class="small" text-anchor="middle">带动词边的命题关系</text><text x="874" y="360" class="head" text-anchor="middle">机制示意</text><path d="M728 410 L786 410" class="line" fill="none"/><path d="M802 388 C842 366 896 372 928 410 C896 448 840 452 802 430 Z" class="region" fill="#f6e7c6"/><text x="866" y="416" class="small" text-anchor="middle">系统</text><path d="M928 410 L982 410" class="line" fill="none"/><circle cx="1006" cy="410" r="20" fill="#e7ddf2" class="box"/><text x="1006" y="415" class="small" text-anchor="middle">测量</text><text x="874" y="478" class="small" text-anchor="middle">输入、处理、测量、输出</text><text x="820" y="558" class="head" text-anchor="middle">路线 / 阶梯</text><ellipse cx="696" cy="526" rx="38" ry="18" fill="#dce9f6" class="box"/><text x="696" y="531" class="small" text-anchor="middle">基础</text><path d="M734 526 C752 520 774 512 796 504" class="curve" fill="none"/><ellipse cx="774" cy="500" rx="38" ry="18" fill="#d9ead3" class="box"/><text x="774" y="505" class="small" text-anchor="middle">概念</text><path d="M812 500 C830 494 852 486 874 478" class="curve" fill="none"/><ellipse cx="852" cy="470" rx="38" ry="18" fill="#f1d4cf" class="box"/><text x="852" y="475" class="small" text-anchor="middle">论文图</text><text x="820" y="582" class="small" text-anchor="middle">时间或前置能力</text><text x="356" y="558" class="head" text-anchor="middle">比较图</text><ellipse cx="300" cy="468" rx="70" ry="48" fill="#dce9f6" class="box"/><ellipse cx="372" cy="468" rx="70" ry="48" fill="#d9ead3" class="box"/><text x="284" y="472" class="small" text-anchor="middle">方向A</text><text x="388" y="472" class="small" text-anchor="middle">方向B</text><text x="336" y="472" class="small" text-anchor="middle">交集</text><path d="M466 512 L466 422 M424 470 L518 470" class="soft" fill="none"/><circle cx="500" cy="440" r="8" fill="#f1d4cf" class="box"/><circle cx="446" cy="492" r="8" fill="#f6e7c6" class="box"/><text x="356" y="582" class="small" text-anchor="middle">差异、交集、二维判断</text><text x="154" y="558" class="head" text-anchor="middle">证据图</text><rect x="74" y="416" width="66" height="54" rx="8" fill="#fff7f5" class="box"/><text x="107" y="448" class="small" text-anchor="middle">弱</text><rect x="154" y="416" width="66" height="54" rx="8" fill="#f6e7c6" class="box"/><text x="187" y="448" class="small" text-anchor="middle">交叉</text><rect x="234" y="416" width="66" height="54" rx="8" fill="#d9ead3" class="box"/><text x="267" y="448" class="small" text-anchor="middle">直接</text><text x="154" y="496" class="small" text-anchor="middle">边界卡</text><text x="154" y="582" class="small" text-anchor="middle">强弱、复核点、不确定性</text><text x="626" y="128" class="head" text-anchor="middle">标注论文图</text><path d="M570 194 L570 132 L680 132" class="soft" fill="none"/><path d="M582 176 C606 150 640 146 666 162" class="curve" fill="none"/><circle cx="638" cy="150" r="7" fill="#f1d4cf" class="box"/><path d="M644 150 L696 104" class="weak" fill="none"/><text x="712" y="108" class="small">读法标注</text><text x="626" y="220" class="small" text-anchor="middle">论文图先看哪里</text><text x="602" y="520" class="head" text-anchor="middle">数据图</text><path d="M560 468 L560 398 L668 398" class="soft" fill="none"/><rect x="580" y="442" width="18" height="26" rx="2" fill="#dce9f6" class="box"/><rect x="610" y="424" width="18" height="44" rx="2" fill="#d9ead3" class="box"/><rect x="640" y="408" width="18" height="60" rx="2" fill="#f6e7c6" class="box"/><circle cx="590" cy="424" r="5" fill="#f1d4cf" class="box"/><circle cx="638" cy="408" r="5" fill="#e7ddf2" class="box"/><text x="602" y="544" class="small" text-anchor="middle">真实数量、趋势、分布</text>
