<svg xmlns="http://www.w3.org/2000/svg" width="920" height="340" viewBox="0 0 920 340" role="img" aria-label="证据边界卡用法" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#31363b"/></marker>
    <style>.title{font-size:21px;font-weight:700;fill:#222426}.note{font-size:13px;fill:#5f6670}.head{font-size:15px;font-weight:700;fill:#222426}.txt{font-size:13px;fill:#343a40}.small{font-size:12px;fill:#5f6670}.box{stroke:#30343a;stroke-width:1.6}.soft{stroke:#9aa0a6;stroke-width:1.4}.line{stroke:#31363b;stroke-width:2;fill:none;marker-end:url(#arrow)}.bad{stroke:#8a3a32;stroke-width:2.2}.weak{stroke:#6f7780;stroke-width:1.6;stroke-dasharray:7 5;fill:none}</style>
  </defs>
  <rect x="16" y="16" width="888" height="308" rx="16" fill="#fbfaf7" stroke="#30343a" stroke-width="2"/>
  <text x="38" y="50" class="title">证据关系：把证据边界贴在判断旁边，不把来源画成网络</text>
  <text x="38" y="75" class="note">用法：读者先读判断，再看每个来源支撑哪一部分、强到什么程度。</text>

  <g transform="translate(40 104)">
    <rect x="0" y="0" width="260" height="158" rx="10" fill="#fff7f5" class="box"/>
    <text x="18" y="28" class="head">禁用：来源网络</text>
    <text x="18" y="52" class="small">线条会把弱线索画得像关系证据</text>
    <circle cx="66" cy="104" r="26" fill="#ffffff" class="box"/><text x="52" y="109" class="small">官网</text>
    <circle cx="164" cy="80" r="26" fill="#ffffff" class="box"/><text x="150" y="85" class="small">论文</text>
    <circle cx="166" cy="132" r="26" fill="#ffffff" class="box"/><text x="152" y="137" class="small">新闻</text>
    <line x1="92" y1="99" x2="138" y2="87" class="soft"/>
    <line x1="91" y1="112" x2="140" y2="124" class="soft"/>
    <line x1="164" y1="106" x2="164" y2="105" class="soft"/>
    <line x1="38" y1="64" x2="226" y2="156" class="bad"/>
    <line x1="226" y1="64" x2="38" y2="156" class="bad"/>
  </g>

  <path class="line" d="M324 183 L370 183"/>

  <g transform="translate(390 104)">
    <rect x="0" y="0" width="220" height="158" rx="10" fill="#f6e7c6" class="box"/>
    <text x="18" y="28" class="head">正文判断</text>
    <text x="18" y="58" class="txt">方向可先放在</text>
    <text x="18" y="79" class="txt">某问题域附近阅读</text>
    <line x1="18" y1="102" x2="198" y2="102" class="soft"/>
    <text x="18" y="126" class="small">判断会影响 02 和 03 的阅读顺序</text>
  </g>

  <g transform="translate(636 90)">
    <rect x="0" y="0" width="232" height="188" rx="10" fill="#ffffff" class="box"/>
    <text x="18" y="30" class="head">证据边界卡</text>
    <rect x="18" y="48" width="196" height="32" rx="6" fill="#d9ead3" class="box"/>
    <text x="30" y="69" class="txt">官网：直接事实</text>
    <rect x="18" y="88" width="196" height="32" rx="6" fill="#dce9f6" class="box"/>
    <text x="30" y="109" class="txt">近年论文：交叉支持</text>
    <rect x="18" y="128" width="196" height="32" rx="6" fill="#ffffff" stroke="#6f7780" stroke-width="1.5" stroke-dasharray="7 5"/>
    <text x="30" y="149" class="txt">新闻讲座：弱线索</text>
    <text x="18" y="178" class="small">输出：哪里稳，哪里要复核</text>
  </g>

  <text x="38" y="300" class="note">审稿问题：卡片是否写清来源实际支撑哪句话？只列来源名时，改回来源表。</text>
</svg>
