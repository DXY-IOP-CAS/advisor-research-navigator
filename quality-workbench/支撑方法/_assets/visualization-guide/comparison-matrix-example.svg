<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" role="img" aria-label="对比矩阵示例" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <defs><style>.bg{fill:#fffaf0;stroke:#3a342c;stroke-width:2.2}.title{fill:#2f2a24;font-size:22px;font-weight:700}.note{fill:#5f5548;font-size:13px}.cell{fill:#f8f3e8;stroke:#3a342c;stroke-width:1.3}.head{fill:#bfd7ea;stroke:#3a342c;stroke-width:1.3}.label{fill:#2f2a24;font-size:14px;font-weight:700}.small{fill:#5f5548;font-size:12px}</style></defs>
  <rect x="20" y="20" width="680" height="300" rx="22" class="bg"/>
  <text x="48" y="62" class="title">对比矩阵：用同一组字段比较多个对象</text>
  <text x="48" y="88" class="note">矩阵适合扫字段，正文仍要讲清最重要的差异。</text>
  <g transform="translate(82 122)">
    <rect x="0" y="0" width="130" height="44" rx="10" class="head"/><rect x="130" y="0" width="130" height="44" rx="10" class="head"/><rect x="260" y="0" width="130" height="44" rx="10" class="head"/><rect x="390" y="0" width="130" height="44" rx="10" class="head"/>
    <text x="65" y="28" class="label" text-anchor="middle">对象</text><text x="195" y="28" class="label" text-anchor="middle">问题</text><text x="325" y="28" class="label" text-anchor="middle">方法</text><text x="455" y="28" class="label" text-anchor="middle">作用</text>
    <rect x="0" y="44" width="130" height="52" class="cell"/><rect x="130" y="44" width="130" height="52" class="cell"/><rect x="260" y="44" width="130" height="52" class="cell"/><rect x="390" y="44" width="130" height="52" class="cell"/>
    <rect x="0" y="96" width="130" height="52" class="cell"/><rect x="130" y="96" width="130" height="52" class="cell"/><rect x="260" y="96" width="130" height="52" class="cell"/><rect x="390" y="96" width="130" height="52" class="cell"/>
    <text x="65" y="76" class="small" text-anchor="middle">论文 A</text><text x="195" y="76" class="small" text-anchor="middle">底座问题</text><text x="325" y="76" class="small" text-anchor="middle">测量</text><text x="455" y="76" class="small" text-anchor="middle">给入口</text>
    <text x="65" y="128" class="small" text-anchor="middle">论文 B</text><text x="195" y="128" class="small" text-anchor="middle">目标问题</text><text x="325" y="128" class="small" text-anchor="middle">对比</text><text x="455" y="128" class="small" text-anchor="middle">接当前</text>
  </g>
</svg>
