<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" role="img" aria-label="证据边界图示例" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#3a342c"/></marker>
    <style>.bg{fill:#fffaf0;stroke:#3a342c;stroke-width:2.2}.title{fill:#2f2a24;font-size:22px;font-weight:700}.note{fill:#5f5548;font-size:13px}.box{stroke:#3a342c;stroke-width:1.8}.line{stroke:#3a342c;stroke-width:1.8;marker-end:url(#arrow)}.weak{stroke-dasharray:7 5}.label{fill:#2f2a24;font-size:14px;font-weight:700}.small{fill:#5f5548;font-size:12px}</style>
  </defs>
  <rect x="20" y="20" width="680" height="300" rx="22" class="bg"/>
  <text x="48" y="62" class="title">证据边界图：让判断附近看得到来源强弱</text>
  <text x="48" y="88" class="note">颜色不能替代文字标签；弱线索不能画得像强证据。</text>
  <rect x="292" y="142" width="150" height="62" rx="18" fill="#f2e7c9" class="box"/><text x="367" y="168" class="label" text-anchor="middle">正文判断</text><text x="367" y="188" class="small" text-anchor="middle">当前方向定位</text>
  <rect x="82" y="120" width="130" height="44" rx="13" fill="#bfd7ea" class="box"/><text x="147" y="148" class="label" text-anchor="middle">官网</text>
  <rect x="82" y="208" width="130" height="44" rx="13" fill="#d8eac8" class="box"/><text x="147" y="236" class="label" text-anchor="middle">近期论文</text>
  <rect x="522" y="120" width="130" height="44" rx="13" fill="#f8f3e8" class="box" stroke-dasharray="7 5"/><text x="587" y="148" class="label" text-anchor="middle">新闻</text>
  <rect x="522" y="208" width="130" height="44" rx="13" fill="#f2b6a0" class="box"/><text x="587" y="236" class="label" text-anchor="middle">综述</text>
  <line x1="212" y1="142" x2="292" y2="162" class="line"/><line x1="212" y1="230" x2="292" y2="188" class="line"/><line x1="522" y1="142" x2="442" y2="162" class="line weak"/><line x1="522" y1="230" x2="442" y2="188" class="line"/>
</svg>
