<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360" role="img" aria-label="学习桥地图示例" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
