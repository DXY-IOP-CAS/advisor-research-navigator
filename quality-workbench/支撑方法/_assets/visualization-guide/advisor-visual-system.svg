    <text x="22" y="66" fill="#5f5548" font-size="13">问题：怎么学到能读</text>
    <rect x="20" y="98" width="46" height="30" rx="9" fill="#bfd7ea" stroke="#3a342c" stroke-width="1.2"/>
    <rect x="84" y="88" width="58" height="50" rx="11" fill="#d8eac8" stroke="#3a342c" stroke-width="1.2"/>
    <rect x="156" y="98" width="24" height="30" rx="9" fill="#f2b6a0" stroke="#3a342c" stroke-width="1.2"/>
    <line x1="66" y1="113" x2="84" y2="113" stroke="#3a342c" stroke-width="1.5"/>
    <line x1="142" y1="113" x2="156" y2="113" stroke="#3a342c" stroke-width="1.5"/>
    <text x="43" y="117" fill="#2f2a24" font-size="10" text-anchor="middle">已会</text>
    <text x="113" y="108" fill="#2f2a24" font-size="10" text-anchor="middle">缺口</text>
    <text x="113" y="124" fill="#2f2a24" font-size="10" text-anchor="middle">任务</text>
    <text x="168" y="117" fill="#2f2a24" font-size="10" text-anchor="middle">出</text>
    <text x="22" y="196" fill="#2f2a24" font-size="13">主图：学习桥</text>
    <text x="22" y="220" fill="#5f5548" font-size="12">从课程基础</text>
    <text x="22" y="240" fill="#5f5548" font-size="12">走到论文任务</text>
  </g>

  <rect x="96" y="424" width="1088" height="42" rx="12" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.6"/>
  <text x="120" y="451" fill="#5f5548" font-size="14">读法：每份文档只承担一个主要理解门槛。后文可以回看前文，但不能重复前文的主视觉任务。</text>
</svg>
