    <text x="22" y="66" fill="#5f5548" font-size="13">问题：论文怎样分工</text>
    <rect x="60" y="106" width="68" height="36" rx="11" fill="#f2e7c9" stroke="#3a342c" stroke-width="1.3"/>
    <rect x="18" y="82" width="52" height="24" rx="8" fill="#bfd7ea" stroke="#3a342c" stroke-width="1.1"/>
    <rect x="18" y="150" width="52" height="24" rx="8" fill="#f2b6a0" stroke="#3a342c" stroke-width="1.1"/>
    <rect x="122" y="82" width="52" height="24" rx="8" fill="#d8eac8" stroke="#3a342c" stroke-width="1.1"/>
    <line x1="70" y1="94" x2="82" y2="106" stroke="#5f5548" stroke-width="1.2"/>
    <line x1="70" y1="162" x2="82" y2="142" stroke="#5f5548" stroke-width="1.2"/>
    <line x1="128" y1="106" x2="148" y2="94" stroke="#5f5548" stroke-width="1.2"/>
    <text x="22" y="196" fill="#2f2a24" font-size="13">主图：论文角色</text>
    <text x="22" y="220" fill="#5f5548" font-size="12">找中心问题</text>
    <text x="22" y="240" fill="#5f5548" font-size="12">区分主线旁支</text>
  </g>

  <path d="M976 262 L1012 262" stroke="#3a342c" stroke-width="2"/>
