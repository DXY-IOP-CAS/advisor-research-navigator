    <text x="22" y="66" fill="#5f5548" font-size="13">问题：方向在哪</text>
    <circle cx="70" cy="124" r="42" fill="#bfd7ea" fill-opacity=".75" stroke="#3a342c" stroke-width="1.4"/>
    <circle cx="122" cy="124" r="34" fill="#d8eac8" fill-opacity=".75" stroke="#3a342c" stroke-width="1.4"/>
    <circle cx="96" cy="118" r="18" fill="#f2b6a0" fill-opacity=".88" stroke="#3a342c" stroke-width="1.4"/>
    <text x="22" y="196" fill="#2f2a24" font-size="13">主图：领域地形</text>
    <text x="22" y="220" fill="#5f5548" font-size="12">建立范围感</text>
    <text x="22" y="240" fill="#5f5548" font-size="12">和相邻方向</text>
  </g>

  <path d="M734 262 L770 262" stroke="#3a342c" stroke-width="2"/>
