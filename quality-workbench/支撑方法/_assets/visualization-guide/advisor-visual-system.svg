    <circle cx="52" cy="158" r="7" fill="#f2b6a0" stroke="#3a342c" stroke-width="1.2"/>
    <rect x="76" y="88" width="78" height="20" rx="7" fill="#bfd7ea" stroke="#3a342c" stroke-width="1"/>
    <rect x="76" y="118" width="78" height="20" rx="7" fill="#d8eac8" stroke="#3a342c" stroke-width="1"/>
    <rect x="76" y="148" width="78" height="20" rx="7" fill="#f2b6a0" stroke="#3a342c" stroke-width="1"/>
    <text x="22" y="196" fill="#2f2a24" font-size="13">主图：履历 + 论文矩阵</text>
    <text x="22" y="220" fill="#5f5548" font-size="12">锁定身份和资料</text>
    <text x="22" y="240" fill="#5f5548" font-size="12">给后文提供材料</text>
  </g>

  <path d="M492 262 L528 262" stroke="#3a342c" stroke-width="2"/>
  <path d="M528 262 l-9 -6 v12 z" fill="#3a342c"/>

  <g transform="translate(538 132)">
