<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-label="00-04 图文配合" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <rect x="22" y="22" width="1236" height="476" rx="24" fill="#fffaf0" stroke="#3a342c" stroke-width="2.4"/>
  <text x="54" y="66" fill="#2f2a24" font-size="24" font-weight="700">00-04 图文配合：一份文档解决一个主要理解门槛</text>
  <text x="54" y="96" fill="#5f5548" font-size="14">每份文档都可以有图，但主视觉不同。图要服务该文档的出口能力，不重复上一份文档的任务。</text>

  <g transform="translate(54 132)">
    <rect width="188" height="260" rx="18" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.8"/>
    <text x="22" y="34" fill="#2f2a24" font-size="18" font-weight="700">00 材料导读</text>
    <text x="22" y="66" fill="#5f5548" font-size="13">问题：怎么读</text>
    <path d="M40 112 L86 112 L86 84 L132 84 M86 112 L86 142 L132 142" fill="none" stroke="#3a342c" stroke-width="1.6"/>
    <rect x="22" y="98" width="42" height="28" rx="9" fill="#bfd7ea" stroke="#3a342c" stroke-width="1.2"/>
    <rect x="132" y="70" width="38" height="28" rx="9" fill="#d8eac8" stroke="#3a342c" stroke-width="1.2"/>
    <rect x="132" y="128" width="38" height="28" rx="9" fill="#f2b6a0" stroke="#3a342c" stroke-width="1.2"/>
    <text x="22" y="196" fill="#2f2a24" font-size="13">主图：阅读决策</text>
    <text x="22" y="220" fill="#5f5548" font-size="12">知道先读什么</text>
    <text x="22" y="240" fill="#5f5548" font-size="12">以及何时回看</text>
  </g>

  <path d="M250 262 L286 262" stroke="#3a342c" stroke-width="2"/>
  <path d="M286 262 l-9 -6 v12 z" fill="#3a342c"/>

  <g transform="translate(296 132)">
    <rect width="188" height="260" rx="18" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.8"/>
    <text x="22" y="34" fill="#2f2a24" font-size="18" font-weight="700">01 基础画像</text>
    <text x="22" y="66" fill="#5f5548" font-size="13">问题：老师是谁</text>
    <line x1="52" y1="88" x2="52" y2="160" stroke="#3a342c" stroke-width="1.6"/>
    <circle cx="52" cy="98" r="7" fill="#bfd7ea" stroke="#3a342c" stroke-width="1.2"/>
