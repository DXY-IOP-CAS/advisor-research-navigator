<svg xmlns="http://www.w3.org/2000/svg" width="920" height="340" viewBox="0 0 920 340" role="img" aria-label="字段表格与矩阵边界" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, Arial, sans-serif">
  <defs>
    <style>
      .title{font-size:21px;font-weight:700;fill:#222426}.note{font-size:13px;fill:#5f6670}.head{font-size:15px;font-weight:700;fill:#222426}.txt{font-size:13px;fill:#343a40}.small{font-size:12px;fill:#5f6670}.box{stroke:#30343a;stroke-width:1.6}.soft{stroke:#9aa0a6;stroke-width:1.2}.bad{stroke:#8a3a32;stroke-width:2.2}
    </style>
  </defs>
  <rect x="16" y="16" width="888" height="308" rx="16" fill="#fbfaf7" stroke="#30343a" stroke-width="2"/>
  <text x="38" y="50" class="title">字段扫描：先问学生是在查字段，还是在用两个维度做判断</text>
  <text x="38" y="75" class="note">用法：左侧是默认出口；中间说明何时升级；右侧是禁用画法。</text>

  <g transform="translate(38 104)">
    <rect x="0" y="0" width="250" height="158" rx="10" fill="#ffffff" class="box"/>
    <text x="18" y="28" class="head">默认：普通表格</text>
    <text x="18" y="52" class="small">学生只需要查差异</text>
    <line x1="18" y1="70" x2="232" y2="70" class="soft"/>
    <text x="22" y="92" class="txt">论文</text><text x="92" y="92" class="txt">年份</text><text x="154" y="92" class="txt">来源</text>
    <line x1="18" y1="104" x2="232" y2="104" class="soft"/>
    <text x="22" y="126" class="small">P1</text><text x="92" y="126" class="small">2022</text><text x="154" y="126" class="small">DOI</text>
    <text x="22" y="148" class="small">P2</text><text x="92" y="148" class="small">2024</text><text x="154" y="148" class="small">官网</text>
  </g>

  <g transform="translate(334 104)">
    <rect x="0" y="0" width="250" height="158" rx="10" fill="#ffffff" class="box"/>
    <text x="18" y="28" class="head">升级：矩阵</text>
    <text x="18" y="52" class="small">两个维度共同决定判断</text>
    <text x="24" y="84" class="small">角色</text>
    <text x="88" y="76" class="small">证据强</text><text x="160" y="76" class="small">证据弱</text>
    <rect x="78" y="90" width="70" height="34" rx="6" fill="#d9ead3" class="box"/>
    <rect x="154" y="90" width="70" height="34" rx="6" fill="#f6e7c6" class="box"/>
    <rect x="78" y="128" width="70" height="22" rx="5" fill="#eef1f3" class="box"/>
    <rect x="154" y="128" width="70" height="22" rx="5" fill="#f1d4cf" class="box"/>
    <text x="24" y="112" class="small">入口</text><text x="95" y="112" class="small">进主线</text><text x="168" y="112" class="small">候选</text>
    <text x="24" y="145" class="small">旁支</text><text x="97" y="145" class="small">背景</text><text x="166" y="145" class="small">复核</text>
  </g>

  <g transform="translate(630 104)">
    <rect x="0" y="0" width="250" height="158" rx="10" fill="#fff7f5" class="box"/>
    <text x="18" y="28" class="head">禁用：字段关系网</text>
    <text x="18" y="52" class="small">字段没有关系语义时，不连线</text>
    <circle cx="66" cy="98" r="25" fill="#ffffff" class="box"/><text x="52" y="103" class="small">年份</text>
    <circle cx="146" cy="82" r="25" fill="#ffffff" class="box"/><text x="132" y="87" class="small">来源</text>
    <circle cx="152" cy="134" r="25" fill="#ffffff" class="box"/><text x="138" y="139" class="small">题名</text>
    <line x1="90" y1="94" x2="121" y2="86" class="soft"/>
    <line x1="91" y1="108" x2="128" y2="124" class="soft"/>
    <line x1="147" y1="108" x2="151" y2="109" class="soft"/>
    <line x1="42" y1="60" x2="214" y2="150" class="bad"/>
    <line x1="214" y1="60" x2="42" y2="150" class="bad"/>
  </g>

  <text x="38" y="300" class="note">审稿问题：表后正文有没有拿走一个差异？没有，就删字段、降级或改回短清单。</text>
</svg>
