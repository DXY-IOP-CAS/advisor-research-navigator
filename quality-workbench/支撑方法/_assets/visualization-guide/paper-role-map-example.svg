<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" role="img" aria-label="论文角色地图示例" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#3a342c"/></marker>
    <style>.bg{fill:#fffaf0;stroke:#3a342c;stroke-width:2.2}.title{fill:#2f2a24;font-size:22px;font-weight:700}.note{fill:#5f5548;font-size:13px}.box{stroke:#3a342c;stroke-width:1.7}.line{stroke:#3a342c;stroke-width:1.7;marker-end:url(#arrow)}.label{fill:#2f2a24;font-size:15px;font-weight:700}.small{fill:#5f5548;font-size:12px}</style>
  </defs>
  <rect x="20" y="20" width="680" height="300" rx="22" class="bg"/>
  <text x="48" y="62" class="title">论文角色地图：看论文围绕中心问题怎样分工</text>
  <text x="48" y="88" class="note">线条要有语义：支撑、提供方法、验证目标或旁支线索。</text>
  <rect x="286" y="140" width="150" height="60" rx="18" fill="#f2e7c9" class="box"/>
  <text x="361" y="166" class="label" text-anchor="middle">中心问题</text>
  <text x="361" y="186" class="small" text-anchor="middle">论文群共同追问</text>
  <rect x="88" y="118" width="118" height="48" rx="14" fill="#bfd7ea" class="box"/><text x="147" y="148" class="label" text-anchor="middle">底座论文</text>
  <rect x="92" y="210" width="118" height="48" rx="14" fill="#d8eac8" class="box"/><text x="151" y="240" class="label" text-anchor="middle">方法论文</text>
  <rect x="514" y="118" width="118" height="48" rx="14" fill="#f2b6a0" class="box"/><text x="573" y="148" class="label" text-anchor="middle">目标论文</text>
  <rect x="516" y="210" width="118" height="48" rx="14" fill="#f8f3e8" class="box" stroke-dasharray="7 5"/><text x="575" y="240" class="label" text-anchor="middle">旁支线索</text>
  <line x1="206" y1="142" x2="286" y2="160" class="line"/><line x1="210" y1="234" x2="286" y2="184" class="line"/><line x1="436" y1="160" x2="514" y2="142" class="line"/><line x1="436" y1="184" x2="516" y2="234" class="line" stroke-dasharray="6 5"/>
</svg>
