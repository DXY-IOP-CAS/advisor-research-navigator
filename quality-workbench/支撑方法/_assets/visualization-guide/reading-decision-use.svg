<svg xmlns="http://www.w3.org/2000/svg" width="920" height="340" viewBox="0 0 920 340" role="img" aria-label="阅读决策边界用法" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#31363b"/></marker>
    <style>.title{font-size:21px;font-weight:700;fill:#222426}.note{font-size:13px;fill:#5f6670}.head{font-size:15px;font-weight:700;fill:#222426}.txt{font-size:13px;fill:#343a40}.small{font-size:12px;fill:#5f6670}.box{stroke:#30343a;stroke-width:1.6}.line{stroke:#31363b;stroke-width:2;fill:none;marker-end:url(#arrow)}.weak{stroke:#6f7780;stroke-width:1.6;fill:none;stroke-dasharray:6 5;marker-end:url(#arrow)}.bad{stroke:#8a3a32;stroke-width:2.2}</style>
  </defs>
  <rect x="16" y="16" width="888" height="308" rx="16" fill="#fbfaf7" stroke="#30343a" stroke-width="2"/>
  <text x="38" y="50" class="title">阅读决策：学生正文只保留回看路径，覆盖缺口留给内部审查</text>
  <text x="38" y="75" class="note">用法：图进入 00 或单份文档末尾时，只回答“卡住了回哪里”。</text>

  <g transform="translate(40 104)">
    <rect x="0" y="0" width="372" height="158" rx="10" fill="#ffffff" class="box"/>
    <text x="18" y="28" class="head">可以进入学生正文</text>
    <rect x="18" y="58" width="130" height="38" rx="7" fill="#f6e7c6" class="box"/>
    <text x="32" y="82" class="small">复述不出论文关系</text>
    <rect x="214" y="58" width="120" height="38" rx="7" fill="#dce9f6" class="box"/>
    <text x="238" y="82" class="small">回 03 角色表</text>
    <path class="line" d="M150 77 L208 77"/>
    <rect x="18" y="108" width="130" height="38" rx="7" fill="#f6e7c6" class="box"/>
    <text x="32" y="132" class="small">看不懂范围图</text>
    <rect x="214" y="108" width="120" height="38" rx="7" fill="#d9ead3" class="box"/>
    <text x="238" y="132" class="small">回 02 概念入口</text>
    <path class="line" d="M150 127 L208 127"/>
  </g>

  <g transform="translate(508 104)">
    <rect x="0" y="0" width="372" height="158" rx="10" fill="#fff7f5" class="box"/>
    <text x="18" y="28" class="head">移出学生正文</text>
    <rect x="18" y="58" width="134" height="38" rx="7" fill="#ffffff" stroke="#6f7780" stroke-width="1.5" stroke-dasharray="7 5"/>
    <text x="32" y="82" class="small">官网覆盖</text>
    <rect x="112" y="108" width="134" height="38" rx="7" fill="#ffffff" stroke="#6f7780" stroke-width="1.5" stroke-dasharray="7 5"/>
    <text x="126" y="132" class="small">综述覆盖</text>
    <rect x="208" y="58" width="134" height="38" rx="7" fill="#ffffff" stroke="#6f7780" stroke-width="1.5" stroke-dasharray="7 5"/>
    <text x="222" y="82" class="small">论文覆盖</text>
    <path class="weak" d="M84 96 L146 108"/>
    <path class="weak" d="M246 96 L214 108"/>
    <line x1="40" y1="50" x2="332" y2="148" class="bad"/>
    <line x1="332" y1="50" x2="40" y2="148" class="bad"/>
  </g>

  <text x="38" y="300" class="note">审稿问题：这张图让学生行动，还是展示执行者做了很多事？只展示工作量就移出正文。</text>
</svg>
