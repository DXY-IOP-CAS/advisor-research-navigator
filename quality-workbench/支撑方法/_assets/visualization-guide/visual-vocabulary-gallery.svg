<svg xmlns="http://www.w3.org/2000/svg" width="980" height="820" viewBox="0 0 980 820" role="img" aria-label="可视化类型总览" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <rect x="20" y="20" width="940" height="780" rx="24" fill="#fffaf0" stroke="#3a342c" stroke-width="2.4"/>
  <text x="50" y="62" fill="#2f2a24" font-size="24" font-weight="700">可视化类型总览：先看关系，再选图形</text>
  <text x="50" y="92" fill="#5f5548" font-size="14">每个小图只展示轮廓，正式成品必须换成真实数据、读法和证据边界。</text>

  <g transform="translate(50 125)">
    <rect width="420" height="120" rx="16" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.8"/>
    <text x="20" y="30" fill="#2f2a24" font-size="17" font-weight="700">组成 / 范围图</text>
    <circle cx="118" cy="74" r="36" fill="#bfd7ea" fill-opacity=".78" stroke="#3a342c" stroke-width="1.8"/>
    <circle cx="188" cy="72" r="30" fill="#d8eac8" fill-opacity=".78" stroke="#3a342c" stroke-width="1.8"/>
    <circle cx="156" cy="70" r="20" fill="#f2b6a0" fill-opacity=".82" stroke="#3a342c" stroke-width="1.8"/>
    <text x="245" y="64" fill="#5f5548" font-size="13">看板块组成</text>
    <text x="245" y="84" fill="#5f5548" font-size="13">和粗略大小</text>
  </g>

  <g transform="translate(510 125)">
    <rect width="420" height="120" rx="16" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.8"/>
    <text x="20" y="30" fill="#2f2a24" font-size="17" font-weight="700">层级 / 包含图</text>
    <rect x="72" y="48" width="170" height="52" rx="14" fill="#bfd7ea" fill-opacity=".45" stroke="#3a342c" stroke-width="1.7"/>
    <rect x="98" y="60" width="120" height="28" rx="10" fill="#d8eac8" stroke="#3a342c" stroke-width="1.7"/>
    <rect x="140" y="66" width="58" height="16" rx="8" fill="#f2b6a0" stroke="#3a342c" stroke-width="1.4"/>
