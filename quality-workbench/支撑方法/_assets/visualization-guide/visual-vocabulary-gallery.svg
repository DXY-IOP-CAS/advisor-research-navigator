    <text x="255" y="84" fill="#5f5548" font-size="13">比较多个对象</text>
  </g>

  <g transform="translate(50 545)">
    <rect width="420" height="120" rx="16" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.8"/>
    <text x="20" y="30" fill="#2f2a24" font-size="17" font-weight="700">标注解剖图</text>
    <rect x="70" y="52" width="118" height="56" rx="10" fill="#fffaf0" stroke="#3a342c" stroke-width="1.6"/>
    <path d="M84 94 C110 82,128 64,156 80 S180 90,176 60" fill="none" stroke="#f2b6a0" stroke-width="3"/>
    <line x1="188" y1="62" x2="248" y2="46" stroke="#5f5548" stroke-width="1.4" stroke-dasharray="5 4"/>
    <line x1="146" y1="80" x2="248" y2="78" stroke="#5f5548" stroke-width="1.4" stroke-dasharray="5 4"/>
