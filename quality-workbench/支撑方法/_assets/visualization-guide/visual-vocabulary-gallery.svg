    <line x1="154" y1="72" x2="104" y2="98" stroke="#5f5548" stroke-width="1.6"/>
    <line x1="154" y1="72" x2="212" y2="98" stroke="#5f5548" stroke-width="1.6" stroke-dasharray="6 4"/>
    <circle cx="154" cy="72" r="22" fill="#f2e7c9" stroke="#3a342c" stroke-width="1.7"/>
    <circle cx="92" cy="52" r="14" fill="#bfd7ea" stroke="#3a342c" stroke-width="1.5"/>
    <circle cx="214" cy="52" r="14" fill="#d8eac8" stroke="#3a342c" stroke-width="1.5"/>
    <circle cx="104" cy="98" r="14" fill="#f2b6a0" stroke="#3a342c" stroke-width="1.5"/>
    <circle cx="212" cy="98" r="14" fill="#f2e7c9" stroke="#3a342c" stroke-width="1.5" stroke-dasharray="6 4"/>
