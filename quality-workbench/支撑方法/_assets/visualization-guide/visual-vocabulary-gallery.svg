    <text x="258" y="82" fill="#5f5548" font-size="13">再读变化</text>
  </g>

  <g transform="translate(510 545)">
    <rect width="420" height="120" rx="16" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.8"/>
    <text x="20" y="30" fill="#2f2a24" font-size="17" font-weight="700">时间 / 路线图</text>
    <rect x="70" y="54" width="64" height="34" rx="12" fill="#bfd7ea" stroke="#3a342c" stroke-width="1.5"/>
    <rect x="168" y="54" width="64" height="34" rx="12" fill="#d8eac8" stroke="#3a342c" stroke-width="1.5"/>
    <rect x="266" y="54" width="64" height="34" rx="12" fill="#f2b6a0" stroke="#3a342c" stroke-width="1.5"/>
    <path d="M134 71 L168 71 M232 71 L266 71" fill="none" stroke="#3a342c" stroke-width="1.8"/>
    <text x="82" y="76" fill="#2f2a24" font-size="12">起点</text>
    <text x="180" y="76" fill="#2f2a24" font-size="12">中段</text>
    <text x="278" y="76" fill="#2f2a24" font-size="12">输出</text>
  </g>

  <g transform="translate(50 685)">
    <rect width="420" height="90" rx="16" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.8"/>
    <text x="20" y="30" fill="#2f2a24" font-size="17" font-weight="700">证据风险图</text>
    <rect x="70" y="50" width="56" height="24" rx="8" fill="#d8eac8" stroke="#3a342c" stroke-width="1.3"/>
    <rect x="144" y="50" width="56" height="24" rx="8" fill="#f2e7c9" stroke="#3a342c" stroke-width="1.3" stroke-dasharray="6 4"/>
    <rect x="218" y="50" width="56" height="24" rx="8" fill="#efc0b6" stroke="#3a342c" stroke-width="1.3"/>
    <text x="300" y="60" fill="#5f5548" font-size="13">看判断强弱</text>
    <text x="300" y="78" fill="#5f5548" font-size="13">和复核点</text>
  </g>

  <g transform="translate(510 685)">
    <rect width="420" height="90" rx="16" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.8"/>
    <text x="20" y="30" fill="#2f2a24" font-size="17" font-weight="700">覆盖 / 空白图</text>
    <rect x="76" y="46" width="64" height="30" rx="10" fill="#bfd7ea" stroke="#3a342c" stroke-width="1.4"/>
    <rect x="156" y="46" width="64" height="30" rx="10" fill="#d8eac8" stroke="#3a342c" stroke-width="1.4"/>
    <rect x="236" y="46" width="64" height="30" rx="10" fill="#fffaf0" stroke="#5f5548" stroke-width="1.4" stroke-dasharray="6 4"/>
    <text x="322" y="58" fill="#5f5548" font-size="13">看已有证据</text>
    <text x="322" y="76" fill="#5f5548" font-size="13">和缺口</text>
