<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="860" viewBox="0 0 1180 860" role="img" aria-label="导师材料可视化家族" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
