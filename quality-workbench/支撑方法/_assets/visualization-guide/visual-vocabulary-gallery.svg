    <rect x="64" y="56" width="58" height="34" rx="10" fill="#bfd7ea" stroke="#3a342c" stroke-width="1.6"/>
    <rect x="150" y="56" width="58" height="34" rx="10" fill="#d8eac8" stroke="#3a342c" stroke-width="1.6"/>
    <rect x="236" y="56" width="58" height="34" rx="10" fill="#f2b6a0" stroke="#3a342c" stroke-width="1.6"/>
    <path d="M122 73 L150 73 M208 73 L236 73" fill="none" stroke="#3a342c" stroke-width="1.8"/>
    <text x="316" y="64" fill="#5f5548" font-size="13">看实验或平台</text>
    <text x="316" y="84" fill="#5f5548" font-size="13">从输入到输出</text>
  </g>

  <g transform="translate(510 405)">
    <rect width="420" height="120" rx="16" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.8"/>
    <text x="20" y="30" fill="#2f2a24" font-size="17" font-weight="700">矩阵比较</text>
    <rect x="70" y="50" width="152" height="58" rx="8" fill="#fffaf0" stroke="#3a342c" stroke-width="1.5"/>
    <line x1="70" y1="70" x2="222" y2="70" stroke="#3a342c" stroke-width="1.2"/>
    <line x1="120" y1="50" x2="120" y2="108" stroke="#3a342c" stroke-width="1.2"/>
