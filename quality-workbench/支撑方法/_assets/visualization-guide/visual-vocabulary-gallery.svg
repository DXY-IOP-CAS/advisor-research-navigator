    <text x="245" y="84" fill="#5f5548" font-size="13">判断维度</text>
  </g>

  <g transform="translate(510 265)">
    <rect width="420" height="120" rx="16" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.8"/>
