    <text x="260" y="84" fill="#5f5548" font-size="13">收束到问题域</text>
  </g>

  <g transform="translate(50 265)">
    <rect width="420" height="120" rx="16" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.8"/>
    <text x="20" y="30" fill="#2f2a24" font-size="17" font-weight="700">二维定位图</text>
    <line x1="78" y1="94" x2="215" y2="94" stroke="#3a342c" stroke-width="1.8"/>
    <line x1="78" y1="94" x2="78" y2="46" stroke="#3a342c" stroke-width="1.8"/>
    <line x1="146" y1="94" x2="146" y2="46" stroke="#d6c8ad" stroke-width="1.4" stroke-dasharray="5 4"/>
