<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="420" viewBox="0 0 1060 420" role="img" aria-label="可视化设计四层" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <rect x="22" y="22" width="1016" height="376" rx="24" fill="#fffaf0" stroke="#3a342c" stroke-width="2.4"/>
  <text x="54" y="66" fill="#2f2a24" font-size="24" font-weight="700">可视化设计四层：不要从工具开始</text>
  <text x="54" y="96" fill="#5f5548" font-size="14">每张图都从学生问题出发，逐层落到关系、编码和实现。上游说不清，下游画得越精细越容易误导。</text>

  <g transform="translate(58 136)">
    <rect width="214" height="154" rx="18" fill="#bfd7ea" fill-opacity=".72" stroke="#3a342c" stroke-width="2"/>
    <text x="24" y="38" fill="#2f2a24" font-size="18" font-weight="700">1. 学生问题</text>
    <text x="24" y="72" fill="#2f2a24" font-size="14">他现在卡在哪里？</text>
    <text x="24" y="98" fill="#5f5548" font-size="13">领域位置、论文角色、</text>
    <text x="24" y="120" fill="#5f5548" font-size="13">学习缺口还是证据强弱</text>
  </g>

  <path d="M282 214 L336 214" fill="none" stroke="#3a342c" stroke-width="2.2"/>
  <path d="M336 214 l-10 -7 v14 z" fill="#3a342c"/>

  <g transform="translate(346 136)">
    <rect width="214" height="154" rx="18" fill="#d8eac8" fill-opacity=".82" stroke="#3a342c" stroke-width="2"/>
    <text x="24" y="38" fill="#2f2a24" font-size="18" font-weight="700">2. 关系结构</text>
    <text x="24" y="72" fill="#2f2a24" font-size="14">这里是什么关系？</text>
    <text x="24" y="98" fill="#5f5548" font-size="13">范围、层级、定位、</text>
    <text x="24" y="120" fill="#5f5548" font-size="13">连接、机制、时间、证据</text>
  </g>

  <path d="M570 214 L624 214" fill="none" stroke="#3a342c" stroke-width="2.2"/>
  <path d="M624 214 l-10 -7 v14 z" fill="#3a342c"/>

  <g transform="translate(634 136)">
    <rect width="214" height="154" rx="18" fill="#f2e7c9" stroke="#3a342c" stroke-width="2"/>
    <text x="24" y="38" fill="#2f2a24" font-size="18" font-weight="700">3. 视觉编码</text>
    <text x="24" y="72" fill="#2f2a24" font-size="14">用什么表达关系？</text>
    <text x="24" y="98" fill="#5f5548" font-size="13">位置、包含、面积、</text>
    <text x="24" y="120" fill="#5f5548" font-size="13">颜色、线条、箭头、标注</text>
  </g>

  <path d="M858 214 L912 214" fill="none" stroke="#3a342c" stroke-width="2.2"/>
  <path d="M912 214 l-10 -7 v14 z" fill="#3a342c"/>

  <g transform="translate(922 136)">
    <rect width="82" height="154" rx="18" fill="#f2b6a0" fill-opacity=".86" stroke="#3a342c" stroke-width="2"/>
    <text x="20" y="38" fill="#2f2a24" font-size="18" font-weight="700">4</text>
    <text x="20" y="68" fill="#2f2a24" font-size="14">实现</text>
    <text x="20" y="96" fill="#5f5548" font-size="12">SVG</text>
    <text x="20" y="116" fill="#5f5548" font-size="12">表格</text>
    <text x="20" y="136" fill="#5f5548" font-size="12">工具</text>
  </g>

  <rect x="72" y="326" width="916" height="42" rx="12" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.6"/>
  <text x="94" y="353" fill="#5f5548" font-size="14">判断句：学生问题能写清，关系类型能说清，编码有证据边界，导出链路能稳定复现，图才进入成品。</text>
</svg>
