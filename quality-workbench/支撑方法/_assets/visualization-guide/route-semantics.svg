<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" role="img" aria-label="路线箭头语义" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#3a342c"/></marker>
  </defs>
  <rect x="24" y="24" width="712" height="352" rx="24" fill="#fffaf0" stroke="#3a342c" stroke-width="2.2"/>
  <text x="52" y="66" fill="#2f2a24" font-size="23" font-weight="700">同样是箭头，语义必须不同</text>
  <text x="52" y="96" fill="#5f5548" font-size="13">图题和图下注释要说清箭头读法，否则学生只会看到普通流程图。</text>

  <g transform="translate(62 132)">
    <text x="0" y="0" fill="#2f2a24" font-size="16" font-weight="700">时间先后</text>
    <rect x="0" y="22" width="106" height="42" rx="13" fill="#bfd7ea" stroke="#3a342c" stroke-width="1.6"/>
    <rect x="156" y="22" width="106" height="42" rx="13" fill="#d8eac8" stroke="#3a342c" stroke-width="1.6"/>
    <rect x="312" y="22" width="106" height="42" rx="13" fill="#f2b6a0" stroke="#3a342c" stroke-width="1.6"/>
    <path d="M110 43 L150 43 M266 43 L306 43" stroke="#3a342c" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="53" y="48" fill="#2f2a24" font-size="13" text-anchor="middle">早期</text>
    <text x="209" y="48" fill="#2f2a24" font-size="13" text-anchor="middle">转折</text>
    <text x="365" y="48" fill="#2f2a24" font-size="13" text-anchor="middle">当前</text>
    <text x="450" y="48" fill="#5f5548" font-size="13">箭头表示先后</text>
  </g>

  <g transform="translate(62 222)">
    <text x="0" y="0" fill="#2f2a24" font-size="16" font-weight="700">机制流转</text>
    <rect x="0" y="22" width="106" height="42" rx="13" fill="#bfd7ea" stroke="#3a342c" stroke-width="1.6"/>
    <rect x="156" y="22" width="106" height="42" rx="13" fill="#f2e7c9" stroke="#3a342c" stroke-width="1.6"/>
    <rect x="312" y="22" width="106" height="42" rx="13" fill="#f2b6a0" stroke="#3a342c" stroke-width="1.6"/>
    <path d="M110 43 L150 43 M266 43 L306 43" stroke="#3a342c" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="53" y="48" fill="#2f2a24" font-size="13" text-anchor="middle">输入</text>
    <text x="209" y="48" fill="#2f2a24" font-size="13" text-anchor="middle">测量</text>
    <text x="365" y="48" fill="#2f2a24" font-size="13" text-anchor="middle">输出</text>
    <text x="450" y="48" fill="#5f5548" font-size="13">箭头表示能量 / 信息 / 测量流</text>
  </g>

  <g transform="translate(62 312)">
    <text x="0" y="0" fill="#2f2a24" font-size="16" font-weight="700">学习依赖</text>
    <rect x="0" y="22" width="106" height="42" rx="13" fill="#bfd7ea" stroke="#3a342c" stroke-width="1.6"/>
    <rect x="156" y="22" width="106" height="42" rx="13" fill="#d8eac8" stroke="#3a342c" stroke-width="1.6"/>
    <rect x="312" y="22" width="106" height="42" rx="13" fill="#f2b6a0" stroke="#3a342c" stroke-width="1.6"/>
    <path d="M110 43 L150 43 M266 43 L306 43" stroke="#3a342c" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="53" y="48" fill="#2f2a24" font-size="13" text-anchor="middle">基础</text>
    <text x="209" y="48" fill="#2f2a24" font-size="13" text-anchor="middle">缺口</text>
    <text x="365" y="48" fill="#2f2a24" font-size="13" text-anchor="middle">论文图</text>
    <text x="450" y="48" fill="#5f5548" font-size="13">箭头表示前置能力</text>
  </g>
</svg>
