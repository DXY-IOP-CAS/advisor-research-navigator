<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" role="img" aria-label="领域范围地图" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="4.5" orient="auto"><path d="M0,0 L10,4.5 L0,9 Z" fill="#2f3337"/></marker>
    <style>
      .title{font-size:24px;font-weight:700;fill:#202428}
      .note{font-size:13px;fill:#5d6670}
      .head{font-size:15px;font-weight:700;fill:#202428}
      .txt{font-size:13px;fill:#343a40}
      .small{font-size:12px;fill:#5d6670}
      .box{stroke:#2f3337;stroke-width:1.6}
      .thin{stroke:#2f3337;stroke-width:1.2}
      .line{stroke:#2f3337;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .curve{stroke:#2f3337;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#9aa0a6;stroke-width:1.3;fill:none}
      .weak{stroke:#6f7780;stroke-width:1.7;fill:none;stroke-dasharray:7 5;marker-end:url(#arrow)}
      .return{stroke:#6f7780;stroke-width:1.7;fill:none;stroke-dasharray:4 6}
      .bad{stroke:#8a3a32;stroke-width:2.3;fill:none}
      .region{stroke:#2f3337;stroke-width:1.6;opacity:.92}
    </style>
  </defs>
  <rect x="16" y="16" width="1048" height="468" rx="14" fill="#fbfaf7" stroke="#2f3337" stroke-width="2"/>
  <text x="38" y="50" class="title">领域范围地图</text>
  <text x="38" y="76" class="note">用于 02：让学生看见大领域、方法入口、问题域、导师入口和相邻方向的关系。</text>
  <rect x="92" y="126" width="430" height="62" rx="10" fill="#dce9f6" class="box"/><text x="116" y="154" class="head">大领域</text><text x="116" y="178" class="small">先把方向放进可阅读的大范围</text><rect x="132" y="210" width="390" height="62" rx="10" fill="#d9ead3" class="box"/><text x="156" y="238" class="head">方法入口</text><text x="156" y="262" class="small">再分清方法、对象和问题入口</text><rect x="172" y="294" width="350" height="62" rx="10" fill="#f6e7c6" class="box"/><text x="196" y="322" class="head">问题域</text><text x="196" y="346" class="small">最后收窄到后文要读的问题</text><rect x="212" y="378" width="310" height="62" rx="10" fill="#f1d4cf" class="box"/><text x="236" y="406" class="head">导师入口</text><text x="236" y="430" class="small">只表示本文的阅读入口</text><path d="M306 190 L306 210" class="soft" fill="none"/><path d="M306 274 L306 294" class="soft" fill="none"/><path d="M306 358 L306 378" class="soft" fill="none"/><rect x="600" y="126" width="380" height="126" rx="10" fill="#ffffff" class="box"/><text x="626" y="164" class="head">相邻方向</text><text x="626" y="194" class="txt">只写容易混用的方向和复核点</text><text x="626" y="224" class="small">证据不足时不画点位、不画距离</text><path d="M568 188 C534 204 526 248 554 286" class="weak" fill="none"/><text x="612" y="292" class="small">虚线 = 需要回 S1 复核</text><rect x="600" y="306" width="380" height="112" rx="10" fill="#ffffff" class="box"/><circle cx="636" cy="337" r="12" fill="#d9ead3" class="box"/><text x="686" y="342" class="head">允许读出</text><text x="686" y="366" class="small">阅读层级、相邻方向、复核点</text><circle cx="636" cy="385" r="12" fill="#fff7f5" class="box"/><text x="686" y="390" class="head">禁止读出</text><text x="686" y="414" class="small">坐标、面积、距离、学科上下位</text><text x="78" y="472" class="txt">限制：这是阅读入口层次，不是学科分类树；如果只能证明“可能相关”，退回证据边界卡，不画范围定位。</text>
</svg>
