<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" role="img" aria-label="领域地形图示例" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <defs>
    <style>
      .bg{fill:#fffaf0;stroke:#3a342c;stroke-width:2.2}.title{fill:#2f2a24;font-size:22px;font-weight:700}.note{fill:#5f5548;font-size:13px}.label{fill:#2f2a24;font-size:15px;font-weight:700}.small{fill:#5f5548;font-size:12px}.edge{stroke:#3a342c;stroke-width:1.7}
    </style>
  </defs>
  <rect x="20" y="20" width="680" height="300" rx="22" class="bg"/>
  <text x="48" y="62" class="title">领域地形图：看位置、邻近和粗略范围感</text>
  <text x="48" y="88" class="note">面积只表达“大 / 中 / 小”的直觉，不写无来源百分比。</text>
  <ellipse cx="225" cy="192" rx="125" ry="88" fill="#bfd7ea" fill-opacity=".78" class="edge"/>
  <ellipse cx="374" cy="170" rx="104" ry="76" fill="#d8eac8" fill-opacity=".78" class="edge"/>
  <ellipse cx="338" cy="221" rx="72" ry="54" fill="#f2e7c9" fill-opacity=".9" class="edge"/>
  <ellipse cx="430" cy="225" rx="50" ry="38" fill="#f2b6a0" fill-opacity=".9" class="edge"/>
  <ellipse cx="514" cy="178" rx="66" ry="48" fill="#f8f3e8" class="edge" stroke-dasharray="7 5"/>
  <text x="170" y="176" class="label">凝聚态物理</text>
  <text x="342" y="154" class="label">光谱方法</text>
  <text x="293" y="224" class="label">超快物质</text>
  <text x="404" y="229" class="label">导师方向</text>
  <text x="485" y="176" class="label">相邻方向</text>
  <text x="486" y="202" class="small">弱线索用虚线</text>
</svg>
