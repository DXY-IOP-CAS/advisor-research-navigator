<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-label="范围定位图示意" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <rect x="24" y="24" width="712" height="312" rx="24" fill="#fffaf0" stroke="#3a342c" stroke-width="2.2"/>
  <text x="52" y="66" fill="#2f2a24" font-size="23" font-weight="700">范围定位图：先给范围感，再讲上下位</text>
  <text x="52" y="96" fill="#5f5548" font-size="13">读法：看导师方向靠近哪块区域、旁边有什么、哪些位置只是弱线索。</text>
  <ellipse cx="230" cy="205" rx="136" ry="92" fill="#bfd7ea" fill-opacity=".78" stroke="#3a342c" stroke-width="1.8"/>
  <ellipse cx="398" cy="185" rx="118" ry="82" fill="#d8eac8" fill-opacity=".78" stroke="#3a342c" stroke-width="1.8"/>
  <ellipse cx="350" cy="232" rx="84" ry="56" fill="#f2e7c9" fill-opacity=".95" stroke="#3a342c" stroke-width="1.8"/>
  <ellipse cx="462" cy="238" rx="58" ry="42" fill="#f2b6a0" fill-opacity=".92" stroke="#3a342c" stroke-width="2.2"/>
  <ellipse cx="572" cy="190" rx="78" ry="52" fill="#f8f3e8" stroke="#3a342c" stroke-width="1.7" stroke-dasharray="8 6"/>
  <text x="172" y="196" fill="#2f2a24" font-size="15" font-weight="700">大领域</text>
  <text x="364" y="174" fill="#2f2a24" font-size="15" font-weight="700">方法区</text>
  <text x="304" y="238" fill="#2f2a24" font-size="15" font-weight="700">问题域</text>
  <text x="424" y="242" fill="#2f2a24" font-size="15" font-weight="700">导师入口</text>
  <text x="536" y="188" fill="#2f2a24" font-size="15" font-weight="700">相邻方向</text>
  <text x="526" y="212" fill="#5f5548" font-size="12">虚线表示弱线索</text>
  <text x="74" y="306" fill="#5f5548" font-size="13">面积只表达粗略大小，不写无来源百分比。</text>
</svg>
