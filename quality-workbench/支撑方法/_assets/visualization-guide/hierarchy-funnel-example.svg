<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" role="img" aria-label="层级收束图示例" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <defs>
    <style>.bg{fill:#fffaf0;stroke:#3a342c;stroke-width:2.2}.title{fill:#2f2a24;font-size:22px;font-weight:700}.note{fill:#5f5548;font-size:13px}.box{stroke:#3a342c;stroke-width:1.8}.label{fill:#2f2a24;font-size:16px;font-weight:700}.small{fill:#5f5548;font-size:12px}</style>
  </defs>
  <rect x="20" y="20" width="680" height="300" rx="22" class="bg"/>
  <text x="48" y="62" class="title">层级收束图：看大类怎样缩到问题域</text>
  <text x="48" y="88" class="note">它解释上下位关系，不负责表达比例和相邻板块。</text>
  <rect x="90" y="120" width="540" height="52" rx="16" fill="#bfd7ea" fill-opacity=".55" class="box"/>
  <rect x="145" y="172" width="430" height="48" rx="15" fill="#d8eac8" fill-opacity=".72" class="box"/>
  <rect x="210" y="220" width="300" height="44" rx="14" fill="#f2e7c9" class="box"/>
  <rect x="282" y="264" width="156" height="36" rx="13" fill="#f2b6a0" fill-opacity=".9" class="box"/>
  <text x="330" y="153" class="label" text-anchor="middle">一级领域</text>
  <text x="360" y="203" class="label" text-anchor="middle">二级方向</text>
  <text x="360" y="249" class="label" text-anchor="middle">小问题域</text>
  <text x="360" y="288" class="label" text-anchor="middle">导师当前入口</text>
  <text x="535" y="288" class="small">读法：从外层往内层收束</text>
</svg>
