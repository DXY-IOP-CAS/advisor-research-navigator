<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400" role="img" aria-label="路线箭头语义用法" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#31363b"/></marker>
    <style>.title{font-size:21px;font-weight:700;fill:#222426}.note{font-size:13px;fill:#5f6670}.head{font-size:15px;font-weight:700;fill:#222426}.label{font-size:13px;fill:#343a40}.small{font-size:12px;fill:#5f6670}.box{stroke:#30343a;stroke-width:1.5}.line{stroke:#31363b;stroke-width:2;fill:none;marker-end:url(#arrow)}.bad{stroke:#8a3a32;stroke-width:2.2}.soft{stroke:#9aa0a6;stroke-width:1.2}</style>
  </defs>
  <rect x="16" y="16" width="888" height="368" rx="16" fill="#fbfaf7" stroke="#30343a" stroke-width="2"/>
  <text x="38" y="50" class="title">路线关系：路线可以长得相似，箭头语义必须先写清</text>
  <text x="38" y="75" class="note">用法：一张路线只保留一种主语义；时间、机制、学习依赖混在一起时要拆图。</text>

  <g transform="translate(44 106)">
    <rect x="0" y="0" width="248" height="210" rx="10" fill="#ffffff" class="box"/>
    <text x="18" y="30" class="head">01 或履历：时间路线</text>
    <text x="18" y="55" class="small">箭头 = 先后，不暗示原因</text>
    <rect x="18" y="82" width="58" height="34" rx="7" fill="#dce9f6" class="box"/><text x="32" y="104" class="small">早期</text>
    <rect x="94" y="82" width="58" height="34" rx="7" fill="#d9ead3" class="box"/><text x="108" y="104" class="small">转向</text>
    <rect x="170" y="82" width="58" height="34" rx="7" fill="#f1d4cf" class="box"/><text x="184" y="104" class="small">当前</text>
    <path class="line" d="M77 99 L90 99"/><path class="line" d="M153 99 L166 99"/>
    <text x="18" y="152" class="small">学生输出：说出阶段顺序。</text>
    <text x="18" y="178" class="small">降级：年份事实用时间表。</text>
  </g>

  <g transform="translate(336 106)">
    <rect x="0" y="0" width="248" height="210" rx="10" fill="#ffffff" class="box"/>
    <text x="18" y="30" class="head">03：机制路线</text>
    <text x="18" y="55" class="small">箭头 = 输入、处理、输出流转</text>
    <rect x="18" y="82" width="58" height="34" rx="7" fill="#dce9f6" class="box"/><text x="33" y="104" class="small">输入</text>
    <rect x="94" y="82" width="58" height="34" rx="7" fill="#f6e7c6" class="box"/><text x="108" y="104" class="small">测量</text>
    <rect x="170" y="82" width="58" height="34" rx="7" fill="#f1d4cf" class="box"/><text x="184" y="104" class="small">输出</text>
    <path class="line" d="M77 99 L90 99"/><path class="line" d="M153 99 L166 99"/>
    <text x="18" y="152" class="small">学生输出：每步接住什么。</text>
    <text x="18" y="178" class="small">降级：证据不足只写分步清单。</text>
  </g>

  <g transform="translate(628 106)">
    <rect x="0" y="0" width="248" height="210" rx="10" fill="#ffffff" class="box"/>
    <text x="18" y="30" class="head">04：学习依赖路线</text>
    <text x="18" y="55" class="small">箭头 = 前置能力</text>
    <rect x="18" y="82" width="58" height="34" rx="7" fill="#dce9f6" class="box"/><text x="26" y="104" class="small">基础课</text>
    <rect x="94" y="82" width="58" height="34" rx="7" fill="#d9ead3" class="box"/><text x="100" y="104" class="small">概念缺口</text>
    <rect x="170" y="82" width="58" height="34" rx="7" fill="#f1d4cf" class="box"/><text x="180" y="104" class="small">核心图</text>
    <path class="line" d="M77 99 L90 99"/><path class="line" d="M153 99 L166 99"/>
    <text x="18" y="152" class="small">学生输出：先补哪段再读图。</text>
    <text x="18" y="178" class="small">降级：只排课程时用学习块表。</text>
  </g>

  <g transform="translate(200 334)">
    <line x1="0" y1="0" x2="520" y2="0" class="bad"/>
    <text x="124" y="24" class="note">禁用：同一张图里让箭头同时表示时间、机制、因果和学习前置。</text>
  </g>
</svg>
