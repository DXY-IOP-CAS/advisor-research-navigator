<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-label="目标论文核心图标注" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="4.5" orient="auto"><path d="M0,0 L10,4.5 L0,9 Z" fill="#2f3337"/></marker>
    <style>
      .title{font-size:24px;font-weight:700;fill:#202428}
      .note{font-size:13px;fill:#5d6670}
      .head{font-size:15px;font-weight:700;fill:#202428}
      .txt{font-size:13px;fill:#343a40}
      .small{font-size:12px;fill:#5d6670}
      .box{stroke:#2f3337;stroke-width:1.6}
      .thin{stroke:#2f3337;stroke-width:1.2}
      .line{stroke:#2f3337;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .curve{stroke:#2f3337;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#9aa0a6;stroke-width:1.3;fill:none}
      .weak{stroke:#6f7780;stroke-width:1.7;fill:none;stroke-dasharray:7 5;marker-end:url(#arrow)}
      .return{stroke:#6f7780;stroke-width:1.7;fill:none;stroke-dasharray:4 6}
      .bad{stroke:#8a3a32;stroke-width:2.3;fill:none}
      .region{stroke:#2f3337;stroke-width:1.6;opacity:.92}
    </style>
  </defs>
  <rect x="16" y="16" width="1048" height="528" rx="14" fill="#fbfaf7" stroke="#2f3337" stroke-width="2"/>
  <text x="38" y="50" class="title">目标论文核心图标注</text>
  <text x="38" y="76" class="note">用于 03/04：把论文图拆成学生能按顺序阅读和复述的关系。</text>
  <rect x="86" y="128" width="370" height="238" rx="10" fill="#ffffff" class="box"/><text x="112" y="158" class="head">目标论文图的读法草图</text><path d="M130 310 L130 190 L382 190" class="soft" fill="none"/><path d="M142 286 C198 252 236 248 282 220 C326 194 350 204 376 224" class="curve" fill="none"/><circle cx="284" cy="220" r="8" fill="#f1d4cf" class="box"/><circle cx="368" cy="224" r="8" fill="#e7ddf2" class="box"/><text x="122" y="184" class="small" text-anchor="middle">信号</text><text x="392" y="194" class="small">条件</text><circle cx="172" cy="246" r="12" fill="#dce9f6" class="box"/><text x="172" y="250" class="small" text-anchor="middle">1</text><circle cx="284" cy="192" r="12" fill="#f6e7c6" class="box"/><text x="284" y="196" class="small" text-anchor="middle">2</text><circle cx="368" cy="196" r="12" fill="#d9ead3" class="box"/><text x="368" y="200" class="small" text-anchor="middle">3</text><rect x="514" y="130" width="360" height="74" rx="12" fill="#dce9f6" class="box"/><circle cx="548" cy="164" r="13" fill="#ffffff" class="box"/><text x="548" y="168" class="small" text-anchor="middle">1</text><text x="694" y="160" class="head" text-anchor="middle">1. 先看对象和测量量</text><text x="694" y="184" class="small" text-anchor="middle">这张图到底测了什么，不先读结论。</text><rect x="552" y="228" width="360" height="74" rx="12" fill="#f6e7c6" class="box"/><circle cx="586" cy="262" r="13" fill="#ffffff" class="box"/><text x="586" y="266" class="small" text-anchor="middle">2</text><text x="732" y="258" class="head" text-anchor="middle">2. 再看信号变化</text><text x="732" y="282" class="small" text-anchor="middle">峰、斜率、颜色或面板差异各表示什么。</text><rect x="514" y="326" width="360" height="74" rx="12" fill="#d9ead3" class="box"/><circle cx="548" cy="360" r="13" fill="#ffffff" class="box"/><text x="548" y="364" class="small" text-anchor="middle">3</text><text x="694" y="356" class="head" text-anchor="middle">3. 最后接到论文结论</text><text x="694" y="380" class="small" text-anchor="middle">哪些结论由图支持，哪些还要回正文。</text><rect x="514" y="418" width="360" height="56" rx="8" fill="#ffffff" class="box"/><text x="538" y="444" class="small">图例：编号 = 学生读图顺序；淡色框 = 本文读法；原图信息和来源另列。</text><text x="88" y="508" class="txt">限制：标注图只教读法。原图信息、本文解释和学生读图顺序要分清；引用真实论文图时必须保留来源边界。</text>
</svg>
