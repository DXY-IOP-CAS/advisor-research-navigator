<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" role="img" aria-label="机制平台链路图示例" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#3a342c"/></marker>
    <style>.bg{fill:#fffaf0;stroke:#3a342c;stroke-width:2.2}.title{fill:#2f2a24;font-size:22px;font-weight:700}.note{fill:#5f5548;font-size:13px}.box{stroke:#3a342c;stroke-width:1.8}.line{stroke:#3a342c;stroke-width:2;marker-end:url(#arrow)}.label{fill:#2f2a24;font-size:14px;font-weight:700}.small{fill:#5f5548;font-size:12px}</style>
  </defs>
  <rect x="20" y="20" width="680" height="300" rx="22" class="bg"/>
  <text x="48" y="62" class="title">机制 / 平台链路图：看系统怎样从输入走到输出</text>
  <text x="48" y="88" class="note">箭头表示能量流、信息流、测量流或处理流，不能只当装饰线。</text>
  <g transform="translate(58 142)">
    <rect x="0" y="0" width="98" height="56" rx="15" fill="#bfd7ea" class="box"/><text x="49" y="34" class="label" text-anchor="middle">样品</text>
    <line x1="104" y1="28" x2="148" y2="28" class="line"/>
    <rect x="154" y="0" width="98" height="56" rx="15" fill="#f2e7c9" class="box"/><text x="203" y="34" class="label" text-anchor="middle">激发</text>
    <line x1="258" y1="28" x2="302" y2="28" class="line"/>
    <rect x="308" y="0" width="98" height="56" rx="15" fill="#d8eac8" class="box"/><text x="357" y="34" class="label" text-anchor="middle">测量</text>
    <line x1="412" y1="28" x2="456" y2="28" class="line"/>
    <rect x="462" y="0" width="98" height="56" rx="15" fill="#f2b6a0" class="box"/><text x="511" y="34" class="label" text-anchor="middle">数据</text>
  </g>
  <text x="168" y="238" class="small">读法：先看输入，再看中间环节如何改变可观测量，最后看输出能支持什么判断。</text>
</svg>
