<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="范围定位用法" font-family="Microsoft YaHei, Noto Sans CJK SC, PingFang SC, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#31363b"/></marker>
    <style>.title{font-size:21px;font-weight:700;fill:#222426}.note{font-size:13px;fill:#5f6670}.head{font-size:15px;font-weight:700;fill:#222426}.label{font-size:13px;fill:#343a40}.small{font-size:12px;fill:#5f6670}.box{stroke:#30343a;stroke-width:1.6}.line{stroke:#31363b;stroke-width:2;fill:none;marker-end:url(#arrow)}.weak{stroke:#6f7780;stroke-width:1.6;stroke-dasharray:7 5;fill:none}</style>
  </defs>
  <rect x="16" y="16" width="888" height="328" rx="16" fill="#fbfaf7" stroke="#30343a" stroke-width="2"/>
  <text x="38" y="50" class="title">范围关系：先写层级，学生仍会混淆时才画粗定位</text>
  <text x="38" y="75" class="note">用法：这张图服务 02 的位置感，并把问题假设交给 03；面积和距离只表示阅读位置。</text>

  <g transform="translate(40 104)">
    <rect x="0" y="0" width="210" height="172" rx="10" fill="#ffffff" class="box"/>
    <text x="18" y="28" class="head">先不用图</text>
    <text x="18" y="55" class="small">三层正文或相邻方向表</text>
    <text x="18" y="88" class="label">大领域：先定范围</text>
    <text x="18" y="116" class="label">问题域：缩小阅读区</text>
    <text x="18" y="144" class="label">相邻方向：暂不混用</text>
  </g>

  <path class="line" d="M274 190 L326 190"/>

  <g transform="translate(342 96)">
    <rect x="0" y="0" width="328" height="188" rx="10" fill="#ffffff" class="box"/>
    <text x="18" y="30" class="head">升级后的最小定位图</text>
    <ellipse cx="118" cy="108" rx="96" ry="54" fill="#dce9f6" class="box"/>
    <ellipse cx="204" cy="94" rx="78" ry="44" fill="#d9ead3" class="box"/>
    <ellipse cx="184" cy="128" rx="56" ry="30" fill="#f6e7c6" class="box"/>
    <ellipse cx="254" cy="130" rx="42" ry="26" fill="#f1d4cf" class="box"/>
    <ellipse cx="260" cy="72" rx="50" ry="27" fill="#ffffff" class="weak"/>
    <text x="84" y="105" class="label">大领域</text>
    <text x="170" y="89" class="label">方法入口</text>
    <text x="154" y="132" class="label">问题域</text>
    <text x="232" y="135" class="label">导师入口</text>
    <text x="232" y="76" class="small">相邻方向</text>
    <text x="18" y="174" class="small">标签必须写清：示意，不代表比例。</text>
  </g>

  <path class="line" d="M688 190 L740 190"/>

  <g transform="translate(756 104)">
    <rect x="0" y="0" width="110" height="172" rx="10" fill="#eef1f3" class="box"/>
    <text x="18" y="30" class="head">交给 03</text>
    <text x="18" y="64" class="small">问题假设</text>
    <text x="18" y="92" class="small">概念入口</text>
    <text x="18" y="120" class="small">相邻方向</text>
    <text x="18" y="148" class="small">复核点</text>
  </g>

  <text x="38" y="318" class="note">审稿问题：图后有没有用这个粗位置推进概念入口或论文阅读？没有，就改回分层正文。</text>
</svg>
